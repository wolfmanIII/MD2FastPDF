<div id="delete-modal" class="modal modal-open">
    <div class="modal-box glass-panel border-red-500/50 max-w-md shadow-[0_0_30px_rgba(239,68,68,0.2)]">
        <div class="flex items-center space-x-3 mb-4 text-red-500">
            {% with class="w-6 h-6 animate-pulse" %}{% include 'icons/action-trash.html' %}{% endwith %}
            <h2 class="text-xl font-bold tracking-[0.2em]">SISTEMA_DANGER // CONFERMA</h2>
        </div>
        
        <p class="text-zinc-400 text-sm mb-6 tracking-wide uppercase">
            STAI PER ELIMINARE DEFINITIVAMENTE IL FILE:<br>
            <span class="text-white font-mono break-all">{{ filename }}</span>
        </p>
        
        <div class="modal-action">
            <button type="button" 
                    onclick="document.getElementById('delete-modal').remove()"
                    class="btn btn-ghost btn-sm text-zinc-500 uppercase tracking-widest">
                ANNULLA
            </button>
            <button hx-post="/delete" 
                    hx-vals='{"path": "{{ path }}"}'
                    hx-target="#main-view"
                    hx-on::after-request="document.getElementById('delete-modal').remove()"
                    class="btn btn-error btn-sm btn-solid border-none bg-red-600 hover:bg-red-500 text-white px-6 font-bold tracking-widest">
                CONFIRM_PURGE
            </button>
        </div>
    </div>
</div>
