<div id="delete-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="this.parentElement.remove()"></div>
    
    <!-- Modal Content -->
    <div class="glass-panel w-full max-max-w-md p-6 relative z-10 border-red-500/50 shadow-[0_0_30px_rgba(239,68,68,0.2)]">
        <div class="flex items-center space-x-3 mb-4 text-red-500">
            {% with class="w-6 h-6 animate-pulse" %}{% include 'icons/action-trash.html' %}{% endwith %}
            <h2 class="text-xl font-bold tracking-[0.2em]">SISTEMA_DANGER // CONFERMA_ELIMINAZIONE</h2>
        </div>
        
        <p class="text-zinc-400 text-sm mb-6 tracking-wide uppercase">
            STAI PER ELIMINARE DEFINITIVAMENTE IL FILE:<br>
            <span class="text-white font-mono break-all">{{ filename }}</span>
        </p>
        
        <div class="flex justify-end space-x-4">
            <button type="button" 
                    onclick="document.getElementById('delete-modal').remove()"
                    class="px-4 py-2 text-xs font-bold tracking-widest text-zinc-500 hover:text-white transition-colors uppercase border border-zinc-800 hover:border-zinc-400 rounded-sm">
                ANNULLA
            </button>
            <button hx-post="/delete" 
                    hx-vals='{"path": "{{ path }}"}'
                    hx-target="#main-view"
                    hx-on::after-request="document.getElementById('delete-modal').remove()"
                    class="btn-solid border-red-500 bg-red-600 hover:bg-red-500 text-white px-6 py-2 text-xs font-bold tracking-widest rounded-sm">
                CONFIRM_PURGE
            </button>
        </div>
    </div>
</div>
