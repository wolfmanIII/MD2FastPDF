<div class="glass-panel p-6 space-y-2 uppercase tracking-widest relative overflow-hidden">
    <!-- Subtle background accent -->
    <div class="absolute -left-20 top-0 w-40 h-full bg-(--neon-cyan)/5 blur-3xl pointer-events-none"></div>

    <div class="flex flex-col md:flex-row md:items-center justify-between mb-2 pb-2 relative z-10 gap-4">
        <div class="flex items-center space-x-2 overflow-x-auto no-scrollbar shrink-0">
            <h3 class="font-bold text-zinc-100 shrink-0">DATA_ARCHIVE //</h3>
            <a href="/" hx-get="/" hx-target="#aegis-view-core" hx-push-url="true"
                class="text-zinc-100 hover:text-white cursor-pointer transition-colors bg-white/5 px-2 py-0.5 rounded shrink-0 no-underline">DASHBOARD</a>
            <span class="opacity-100 text-zinc-200 shrink-0">/</span>
            {% for crumb in breadcrumbs %}
            <a href="/files?path={{ crumb.path }}" hx-get="/files?path={{ crumb.path }}" hx-target="#aegis-view-core"
                hx-push-url="true"
                class="text-zinc-100 hover:text-white cursor-pointer transition-colors bg-white/5 px-2 py-0.5 rounded shrink-0 no-underline">{{
                crumb.name }}</a>
            <span class="opacity-100 text-zinc-200 shrink-0">/</span>
            {% endfor %}
        </div>

        <!-- NEW FILE BUTTON (Moved next to breadcrumbs for clean layout) -->
        <button hx-get="/create/form?path={{ current_path }}" hx-target="#modal-container"
            class="btn-solid h-8 rounded-sm group flex items-center space-x-2 text-[10px] tracking-[0.2em] font-bold shrink-0">
            {% with class="w-4 h-4" %}{% include 'icons/plus.html' %}{% endwith %}
            <span>NEW_ENTRY</span>
        </button>
    </div>

    <!-- SEPARATE SEARCH ROW -->
    <div class="mb-6 relative z-10">
        <label class="aegis-input-bg input input-bordered w-full flex items-center border-zinc-800 focus-within:border-zinc-600">
            <span class="text-[11px] tracking-[0.3em] font-bold text-(--neon-cyan) shrink-0">SCAN_QUERY //</span>
            <input type="text" name="q" placeholder="AWAITING_INPUT..." value="{{ query if query else '' }}"
                class="grow font-mono text-[11px] tracking-widest" hx-get="/files/search"
                hx-trigger="keyup changed delay:500ms, search" hx-target="#results-grid" hx-swap="outerHTML"
                hx-push-url="false">
        </label>
    </div>

    {% include 'components/results_grid.html' %}
</div>
