<div class="glass-panel p-6 space-y-2 uppercase tracking-widest relative overflow-hidden">
    <!-- Subtle background accent -->
    <div class="absolute -left-20 top-0 w-40 h-full bg-(--neon-cyan)/5 blur-3xl pointer-events-none"></div>

    <div class="flex flex-col md:flex-row md:items-center justify-between mb-2 pb-2 relative z-10 gap-4">
        <div class="flex items-center space-x-2 overflow-x-auto no-scrollbar shrink-0">
            <h3 class="font-bold text-zinc-100 shrink-0">DATA_ARCHIVE //</h3>
            <button hx-get="/" hx-target="#aegis-view-core" hx-push-url="true"
                class="text-zinc-100 hover:text-white cursor-pointer transition-colors bg-white/5 px-2 py-0.5 rounded shrink-0">DASHBOARD</button>
            <span class="opacity-100 text-zinc-200 shrink-0">/</span>
            {% for crumb in breadcrumbs %}
            <button hx-get="/files?path={{ crumb.path }}" hx-target="#aegis-view-core" hx-push-url="true"
                class="text-zinc-100 hover:text-white cursor-pointer transition-colors bg-white/5 px-2 py-0.5 rounded shrink-0">{{
                crumb.name }}</button>
            <span class="opacity-100 text-zinc-200 shrink-0">/</span>
            {% endfor %}
        </div>

        <!-- NEW FILE BUTTON (Moved next to breadcrumbs for clean layout) -->
        <button hx-get="/create/form?path={{ current_path }}" hx-target="#modal-container"
            class="btn-solid h-8 rounded-sm group flex items-center space-x-2 text-[10px] tracking-[0.2em] font-bold shrink-0">
            {% with class="w-4 h-4" %}{% include 'icons/plus.html' %}{% endwith %}
            <span>NEW_ENTRY</span>
        </button>
    </div>

    <!-- SEPARATE SEARCH ROW -->
    <div class="mb-6 relative z-10">
        <div
            class="flex items-center bg-black/40 border border-white/5 rounded-sm overflow-hidden focus-within:border-(--neon-cyan)/30 transition-all duration-300">
            <div class="bg-white/5 px-4 py-2 border-r border-white/5 flex items-center space-x-3 shrink-0">
                <span
                    class="text-(--neon-cyan) animate-pulse shadow-[0_0_5px_var(--neon-cyan)] opacity-70">●</span>
                <span class="text-[9px] tracking-[0.3em] font-bold text-zinc-400">SCAN_QUERY //</span>
            </div>
            <span class="text-zinc-700 font-bold text-[11px] shrink-0 ml-2 opacity-40">::</span>
            <input type="text" name="q" placeholder="AWAITING_INPUT_FOR_LOCAL_AND_REMOTE_SCAN..."
                value="{{ query if query else '' }}"
                class="grow bg-transparent px-4 py-2 text-[11px] tracking-widest text-zinc-100 placeholder-zinc-700 focus:outline-none focus:bg-white/2 transition-all font-mono"
                hx-get="/files/search" hx-trigger="keyup changed delay:500ms, search" hx-target="#results-grid"
                hx-swap="outerHTML" hx-push-url="false">
        </div>
    </div>

    {% include 'components/results_grid.html' %}
</div>
