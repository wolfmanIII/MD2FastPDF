<div id="rename-modal" class="modal modal-open">
  <div class="modal-box bg-zinc-900 border border-zinc-700 max-w-sm w-full rounded-none p-0">

    <div class="flex items-center justify-between px-6 py-4 border-b border-zinc-800">
      <span class="neon-text font-mono text-sm uppercase tracking-widest">// RENAME // REROUTE</span>
      <button onclick="closeAegisModal('rename-modal')" class="btn btn-ghost btn-sm text-zinc-500">✕</button>
    </div>

    <form hx-post="/rename" hx-target="#aegis-view-core"
          hx-on::after-request="closeAegisModal('rename-modal')"
          class="p-6 space-y-4">
      <input type="hidden" name="path" value="{{ path }}">
      <div class="flex flex-col gap-1">
        <label class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest">
          CURRENT: <span class="text-zinc-300 normal-case">{{ filename }}</span>
        </label>
        <input type="text" name="new_name" placeholder="NEW_FILENAME" required autofocus
               value="{{ filename }}" class="w-full">
      </div>
      <div class="flex justify-end gap-2 pt-2 border-t border-zinc-800 mt-4">
        <button type="button" onclick="closeAegisModal('rename-modal')"
                class="btn btn-ghost btn-sm text-zinc-500">ABORT //</button>
        <button type="submit" class="btn-solid text-[10px] rounded-sm">CONFIRM //</button>
      </div>
    </form>

  </div>
</div>
