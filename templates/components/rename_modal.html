<div id="rename-modal" class="modal modal-open">
    <div class="modal-box glass-panel border-(--neon-cyan)/30 max-w-sm">
        <h3 class="font-bold text-lg neon-text tracking-widest mb-4">RENAME // REROUTE</h3>

        <form hx-post="/rename" hx-target="#aegis-view-core"
              hx-on::after-request="closeAegisModal('rename-modal')">
            <input type="hidden" name="path" value="{{ path }}">

            <div class="form-control w-full space-y-4">
                <label class="label">
                    <span class="label-text text-zinc-400 text-xs uppercase tracking-tighter">Current: <span class="text-zinc-100 font-mono">{{ filename }}</span></span>
                </label>
                <input type="text" name="new_name" placeholder="NEW_FILENAME" required autofocus
                       value="{{ filename }}"
                       class="input input-bordered w-full border-(--glass-border) focus:border-(--neon-cyan) text-(--neon-cyan) tracking-widest uppercase text-sm"
                       style="background:rgba(0,0,0,0.4);">

                <div class="modal-action">
                    <button type="button" class="btn btn-ghost btn-sm text-zinc-500 uppercase tracking-widest"
                            onclick="closeAegisModal('rename-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary btn-sm uppercase tracking-widest border-none">Confirm</button>
                </div>
            </div>
        </form>
    </div>
</div>
