<div id="oracle-summary-modal" class="modal modal-open">
    <div class="aegis-hud-modal modal-box glass-panel border-zinc-800 p-0 overflow-hidden shadow-2xl rounded-sm">
        
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-zinc-800 bg-black/40">
            <h3 class="font-bold text-lg tracking-widest uppercase flex items-center space-x-3 text-[#a78bfa]">
                <i class="fa fa-microchip animate-pulse"></i>
                <span>Aegis Intelligence Scan</span>
            </h3>
            <button onclick="closeAegisModal('oracle-summary-modal')" class="text-zinc-500 hover:text-white transition-colors">
                <span class="text-2xl">&times;</span>
            </button>
        </div>
        
        <div class="p-8">
            <div class="prose prose-lg prose-invert max-w-none text-zinc-100 leading-relaxed font-mono bg-black/40 p-12 rounded-sm border border-white/5 shadow-inner">
                {{ summary_html | safe }}
            </div>

            <div class="modal-action mt-10 border-t border-white/5 pt-6 flex justify-between items-center w-full">
                <div class="flex items-center space-x-2 text-xs uppercase tracking-widest text-zinc-400">
                    <span class="w-3 h-3 rounded-full bg-[#a78bfa] animate-ping"></span>
                    <span>UPLINK_STATUS: {{ status }}</span>
                </div>
                <button type="button" onclick="closeAegisModal('oracle-summary-modal')" 
                        class="btn-violet btn-solid h-9 px-8 transition-all uppercase tracking-widest text-[11px]">
                    Termina Sessione
                </button>
            </div>
        </div>
    </div>
</div>
