<div class="glass-panel p-6 mb-6 overflow-hidden relative fade-in">
    <div class="absolute -right-10 -top-10 w-32 h-32 bg-[var(--neon-violet)]/10 rounded-full blur-2xl pointer-events-none"></div>
    
    <h3 class="text-sm font-bold neon-text-violet mb-4 border-b border-[var(--glass-border)] pb-2 flex items-center space-x-2 uppercase tracking-widest">
        <i class="fa-solid fa-brain-circuit animate-pulse"></i>
        <span>NEURAL_SUMMARY_LOG</span>
    </h3>

    <div class="prose prose-invert prose-sm max-w-none text-zinc-300 leading-relaxed font-mono text-[13px]">
        {{ summary_html | safe }}
    </div>

    <div class="mt-6 pt-4 border-t border-[var(--glass-border)] flex justify-between items-center">
        <div class="flex items-center space-x-2 text-[10px] uppercase tracking-tighter text-zinc-500">
            <span class="w-2 h-2 rounded-full bg-[var(--neon-violet)] animate-ping"></span>
            <span>UPLINK_STATUS: {{ status }}</span>
        </div>
        <div class="text-[10px] uppercase tracking-tighter text-zinc-500">
            INTELLIGENCE_EXTRACTOR_v2.5
        </div>
    </div>
</div>
