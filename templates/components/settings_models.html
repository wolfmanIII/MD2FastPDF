<div class="space-y-1">
    <label class="text-[10px] text-zinc-400 uppercase tracking-widest font-bold block">Neural Hint Device</label>
    <select name="model_neural_hint" class="w-full bg-black/60 text-xs font-mono text-(--neon-cyan) focus:outline-none rounded-sm">
        {% for m in available_models %}<option value="{{ m }}" class="bg-zinc-900 text-white" {% if settings.models.neural_hint==m %}selected{% endif %}>{{ m|upper }}</option>{% endfor %}
        {% if settings.models.neural_hint not in available_models %}<option value="{{ settings.models.neural_hint }}" class="bg-zinc-900 text-white" selected>[OFFLINE_FALLBACK] // {{ settings.models.neural_hint|upper }}</option>{% endif %}
    </select>
</div>
