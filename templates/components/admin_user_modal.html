<div id="admin-user-modal" class="modal modal-open">
  <div class="bg-zinc-900 border border-zinc-700 max-w-md w-full rounded-none p-0">

    <div class="flex items-center justify-between px-6 py-4 border-b border-zinc-800">
      <span class="neon-text font-mono text-sm uppercase tracking-widest">
        {% if mode == "create" %}// ENLIST_PERSONNEL{% else %}// MODIFY_CLEARANCE // {{ user.username | upper }}{% endif %}
      </span>
      <button onclick="closeAegisModal('admin-user-modal')" class="btn btn-ghost btn-sm text-zinc-500">✕</button>
    </div>

    <form
      hx-post="{% if mode == 'create' %}/admin/users/create{% else %}/admin/users/{{ user.username }}/edit{% endif %}"
      hx-target="#admin-content-panel"
      hx-on::after-request="closeAegisModal('admin-user-modal')"
      class="p-6 space-y-4">

      {% if mode == "create" %}
      <div class="flex flex-col gap-1">
        <label class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest">CALLSIGN</label>
        <input type="text" name="new_username" required autocomplete="off" class="w-full">
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest">ACCESS_KEY</label>
        <input type="password" name="password" required autocomplete="new-password" class="w-full">
      </div>
      {% endif %}

      <div class="flex flex-col gap-2">
        <label class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest">TEAM_ASSIGNMENT</label>
        {% if groups %}
        <div class="flex flex-wrap gap-3">
          {% for g in groups %}
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="groups" value="{{ g }}"
                   {% if mode == "edit" and user and g in user.groups %}checked{% endif %}
                   class="accent-(--neon-cyan)">
            <span class="text-xs font-mono uppercase text-zinc-300">{{ g }}</span>
          </label>
          {% endfor %}
        </div>
        {% else %}
        <span class="text-zinc-600 text-[10px] font-mono uppercase">NO_TEAMS_DEFINED</span>
        {% endif %}
      </div>

      <div class="flex justify-end gap-2 pt-2 border-t border-zinc-800 mt-4">
        <button type="button" onclick="closeAegisModal('admin-user-modal')"
                class="btn btn-ghost btn-sm text-zinc-500">ABORT //</button>
        <button type="submit" class="btn-solid text-[10px] rounded-sm">
          {% if mode == "create" %}ENLIST //{% else %}UPDATE_CLEARANCE //{% endif %}
        </button>
      </div>
    </form>

  </div>
  <div class="modal-backdrop" onclick="closeAegisModal('admin-user-modal')"></div>
</div>
