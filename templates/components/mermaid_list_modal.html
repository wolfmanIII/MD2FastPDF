<div id="mermaid-list-modal" class="modal modal-open">
  <div class="bg-zinc-900 border border-zinc-700 max-w-md w-full rounded-none p-0">

    <div class="flex items-center justify-between px-6 py-4 border-b border-zinc-800">
      <span class="text-violet-400 font-mono text-sm uppercase tracking-widest flex items-center gap-2">
        <i class="fa fa-image"></i>
        // MERMAID_EXPORT
      </span>
      <button onclick="closeAegisModal('mermaid-list-modal')" class="btn btn-ghost btn-sm text-zinc-500">✕</button>
    </div>

    <div class="p-6 space-y-3">
      {% if not blocks %}
      <p class="text-zinc-500 text-xs uppercase tracking-widest text-center py-6">NO_MERMAID_BLOCKS_FOUND</p>
      {% else %}
      <p class="text-zinc-400 text-xs uppercase tracking-widest">
        {{ blocks|length }} DIAGRAM{{ 'S' if blocks|length > 1 else '' }} — SELECT_TO_EXPORT_PNG
      </p>
      {% for block in blocks %}
      <a href="/render/mermaid/png?path={{ path }}&index={{ loop.index0 }}"
         target="_blank"
         onclick="closeAegisModal('mermaid-list-modal')"
         class="flex items-center justify-between p-3 border border-zinc-800 hover:border-violet-500/50 hover:bg-violet-500/5 transition-all group no-underline">
        <div class="flex items-center gap-3">
          <i class="fa fa-diagram-project text-violet-400 group-hover:text-violet-300"></i>
          <span class="text-zinc-300 text-xs font-mono uppercase tracking-widest">DIAGRAM_{{ loop.index }}</span>
        </div>
        <span class="text-[9px] text-zinc-600 uppercase tracking-widest font-mono">{{ block[:40] | replace('\n', ' ') }}...</span>
        <i class="fa fa-download text-zinc-600 group-hover:text-violet-400 transition-colors shrink-0 ml-3"></i>
      </a>
      {% endfor %}
      {% endif %}
    </div>

  </div>
  <div class="modal-backdrop" onclick="closeAegisModal('mermaid-list-modal')"></div>
</div>
