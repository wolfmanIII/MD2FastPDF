<div id="mermaid-list-modal" class="modal modal-open">
    <div class="modal-box glass-panel border-zinc-800 max-w-md w-full p-0 overflow-hidden shadow-2xl rounded-sm">

        <div class="flex items-center justify-between px-6 py-4 border-b border-zinc-800 bg-black/40">
            <h3 class="font-bold tracking-widest uppercase flex items-center space-x-3 text-violet-400">
                <i class="fa fa-image"></i>
                <span>Mermaid Export</span>
            </h3>
            <button onclick="closeAegisModal('mermaid-list-modal')" class="text-zinc-500 hover:text-white transition-colors">
                <span class="text-2xl">&times;</span>
            </button>
        </div>

        <div class="p-6 space-y-3">
            {% if not blocks %}
            <p class="text-zinc-500 text-xs uppercase tracking-widest text-center py-6">NO_MERMAID_BLOCKS_FOUND</p>
            {% else %}
            <p class="text-zinc-400 text-xs uppercase tracking-widest mb-4">{{ blocks|length }} diagram{{ 's' if blocks|length > 1 else '' }} found — select one to download as PNG.</p>
            {% for block in blocks %}
            <a href="/render/mermaid/png?path={{ path }}&index={{ loop.index0 }}"
               target="_blank"
               onclick="closeAegisModal('mermaid-list-modal')"
               class="flex items-center justify-between p-3 border border-zinc-800 rounded-sm hover:border-violet-500/50 hover:bg-violet-500/5 transition-all group no-underline">
                <div class="flex items-center space-x-3">
                    <i class="fa fa-diagram-project text-violet-400 group-hover:text-violet-300"></i>
                    <span class="text-zinc-300 text-xs font-mono uppercase tracking-widest">DIAGRAM_{{ loop.index }}</span>
                </div>
                <span class="text-[9px] text-zinc-600 uppercase tracking-widest font-mono">{{ block[:40] | replace('\n', ' ') }}...</span>
                <i class="fa fa-download text-zinc-600 group-hover:text-violet-400 transition-colors shrink-0 ml-3"></i>
            </a>
            {% endfor %}
            {% endif %}
        </div>
    </div>
    <div class="modal-backdrop" onclick="closeAegisModal('mermaid-list-modal')"></div>
</div>
