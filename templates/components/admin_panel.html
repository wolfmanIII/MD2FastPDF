<div class="flex flex-col gap-6 w-full">
  <div class="flex items-center justify-between border-b border-zinc-800 pb-4">
    <span class="neon-text font-mono text-lg uppercase tracking-widest">// SYS_ADMIN</span>
    <div class="flex gap-2">
      <button
        hx-get="/admin?tab=users"
        hx-push-url="true"
        class="{% if tab == 'users' %}btn-solid{% else %}btn-ghost{% endif %} text-[10px] rounded-sm focus:outline-none">
        CREW_REGISTRY
      </button>
      <button
        hx-get="/admin?tab=groups"
        hx-push-url="true"
        class="{% if tab == 'groups' %}btn-solid{% else %}btn-ghost{% endif %} text-[10px] rounded-sm focus:outline-none">
        TEAM_INDEX
      </button>
      <button
        hx-get="/admin?tab=blueprints"
        hx-push-url="true"
        class="{% if tab == 'blueprints' %}btn-solid{% else %}btn-ghost{% endif %} text-[10px] rounded-sm focus:outline-none">
        BLUEPRINT_ARCHIVE
      </button>
    </div>
  </div>
  <div id="admin-content-panel">
    {% if tab == 'groups' %}
    {% include 'components/admin_group_list.html' %}
    {% elif tab == 'blueprints' %}
    {% include 'components/blueprint_admin.html' %}
    {% else %}
    {% include 'components/admin_user_list.html' %}
    {% endif %}
  </div>
</div>
