<div id="gs-editor-root" class="grow flex flex-col min-h-0 w-full">

  <!-- Header -->
  <div class="flex flex-col space-y-3 shrink-0 mb-4">
    <div class="aegis-editor-header glass-panel px-6 py-3 flex items-center justify-between border-b-0 rounded-b-none">
      <div class="flex items-center space-x-3 text-[10px] uppercase tracking-[0.25em] whitespace-nowrap overflow-hidden grow">
        <span class="font-bold neon-text shrink-0">LIBRARY //</span>
        <button hx-get="/group-space" hx-target="#aegis-view-core" hx-push-url="true"
                class="text-zinc-100 hover:text-white cursor-pointer transition-colors bg-white/5 px-2 py-0.5 rounded shrink-0">HUB</button>
        <span class="text-zinc-200 shrink-0">/</span>
        <button hx-get="/group-space/{{ group_name }}/files" hx-target="#aegis-view-core" hx-push-url="true"
                class="neon-text hover:text-white cursor-pointer transition-colors bg-white/5 px-2 py-0.5 rounded shrink-0">{{ group_name | upper }}</button>
        {% for crumb in breadcrumbs[1:] %}
        <span class="text-zinc-200 shrink-0">/</span>
        <button hx-get="/group-space/{{ group_name }}/files?path={{ crumb.path }}"
                hx-target="#aegis-view-core" hx-push-url="true"
                class="text-zinc-100 hover:text-white cursor-pointer transition-colors bg-white/5 px-2 py-0.5 rounded shrink-0">{{ crumb.name }}</button>
        {% endfor %}
        <span class="text-zinc-200 shrink-0">/</span>
        <span class="text-white font-bold bg-white/10 px-2 py-0.5 rounded shadow-sm truncate">{{ filename }}</span>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="glass-panel px-6 py-2 flex items-center justify-between border-t border-white/5 rounded-t-none">
      <div class="flex items-center space-x-4">
        {% if read_only %}
        <span class="text-amber-400 font-mono text-[10px] tracking-widest border border-amber-400/30 px-3 py-1">
          READ_ONLY // WRITE_PROTECTED
        </span>
        {% else %}
        <div class="flex items-center space-x-2">
          <button onclick="insertTag('**', '**')" class="w-10 h-10 flex items-center justify-center hover:bg-white/10 transition-all rounded-md text-zinc-400 hover:text-white border border-transparent hover:border-white/5" title="Bold">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 4h8a4 4 0 014 4 4 4 0 01-4 4H6z M6 12h9a4 4 0 014 4 4 4 0 01-4 4H6z"></path></svg>
          </button>
          <button onclick="insertTag('*', '*')" class="w-10 h-10 flex items-center justify-center hover:bg-white/10 transition-all rounded-md text-zinc-400 hover:text-white border border-transparent hover:border-white/5" title="Italic">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m-4 0h4m-6 16h4"></path></svg>
          </button>
          <button onclick="insertTag('# ', '')" class="w-10 h-10 flex items-center justify-center hover:bg-white/10 transition-all rounded-md text-zinc-400 hover:text-white border border-transparent hover:border-white/5" title="Heading">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 2v20m10-20v20M7 12h10"></path></svg>
          </button>
          <button onclick="insertTag('- ', '')" class="w-10 h-10 flex items-center justify-center hover:bg-white/10 transition-all rounded-md text-zinc-400 hover:text-white border border-transparent hover:border-white/5" title="List">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
          </button>
          <div class="w-px h-6 bg-zinc-700 mx-1"></div>
          <button hx-get="/blueprints/modal"
                  hx-target="#modal-container"
                  hx-swap="innerHTML"
                  class="w-10 h-10 flex items-center justify-center hover:bg-white/10 transition-all rounded-md text-zinc-400 hover:text-white border border-transparent hover:border-white/5" title="Blueprint Archive">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
          </button>
        </div>
        {% endif %}
      </div>

      <div class="flex items-center space-x-4">
        <div id="gs-save-notification" class="text-[9px] uppercase tracking-widest text-zinc-500 font-mono"></div>
        {% if not read_only %}
        <button hx-post="/group-space/{{ group_name }}/save"
                hx-include="#gs-editor-form"
                hx-target="#gs-save-notification"
                class="btn-solid text-[10px] h-10 px-8 transition-all">
          <span>COMMIT_CHANGES</span>
        </button>
        {% endif %}
      </div>
    </div>
  </div>

  <!-- Editor split -->
  <div class="grow flex space-x-3 min-w-0 min-h-0 overflow-hidden w-full">
    <!-- Input pane -->
    <div class="aegis-panel-bg flex-1 min-w-0 flex flex-col glass-panel p-0 overflow-hidden relative group">
      <div class="flex items-center justify-between px-6 py-2 neon-border-b bg-black/20 shrink-0">
        <span class="text-[11px] text-zinc-100 uppercase tracking-widest font-bold">INPUT_BUFFER</span>
        {% if read_only %}<span class="text-amber-400 text-[10px] font-mono tracking-widest">LOCKED</span>{% endif %}
      </div>
      <div class="grow w-full overflow-hidden relative">
        <form id="gs-editor-form" class="h-full w-full absolute inset-0 flex flex-col m-0 overflow-hidden">
          <input type="hidden" name="path" value="{{ path }}">
          <textarea name="content" id="gs-editor-input"
            {% if read_only %}readonly{% endif %}
            class="w-full h-full bg-transparent p-10 font-mono text-base leading-[1.8] outline-none resize-none text-slate-300 focus:text-white transition-colors {% if read_only %}opacity-70 cursor-not-allowed{% endif %}"
            spellcheck="false">{{ content }}</textarea>
        </form>
      </div>
    </div>

    <!-- Preview pane -->
    <div class="aegis-panel-bg flex-1 min-w-0 flex flex-col glass-panel overflow-hidden relative">
      <div class="flex items-center justify-between px-6 py-2 neon-border-b bg-black/20 shrink-0">
        <span class="text-[9px] neon-text uppercase tracking-widest font-bold">PREVIEW_RENDER</span>
        <div class="w-2 h-2 rounded-full neon-bg animate-pulse"></div>
      </div>
      <div class="grow w-full overflow-hidden relative">
        <div id="gs-preview-pane"
             class="absolute inset-0 p-12 overflow-y-auto prose prose-invert prose-slate max-w-none scrollbar-thin text-slate-300">
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const input = document.getElementById('gs-editor-input');
      const preview = document.getElementById('gs-preview-pane');

      marked.setOptions({ breaks: true, gfm: true });

      const render = () => { preview.innerHTML = marked.parse(input.value || ''); };
      input.addEventListener('input', render);
      render();

      {% if not read_only %}
      function insertTag(before, after) {
        const start = input.selectionStart;
        const end = input.selectionEnd;
        const selected = input.value.substring(start, end);
        input.value = input.value.substring(0, start) + before + selected + after + input.value.substring(end);
        input.selectionStart = start + before.length;
        input.selectionEnd = end + before.length;
        input.focus();
        input.dispatchEvent(new Event('input'));
      }
      window.insertTag = insertTag;
      {% endif %}
    })();
  </script>
</div>
