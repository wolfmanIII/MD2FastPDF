<div id="editor-easymde-root"
    style="width: 100% !important; height: 85vh !important; display: flex !important; flex-direction: column !important; overflow: hidden !important; min-width: 0 !important; background: transparent !important;">

    <!-- Row 1: Status & Context -->
    <div class="glass-panel px-6 py-3 flex items-center justify-between border-b-0 rounded-b-none shrink-0"
        style="background: rgba(20, 20, 25, 0.8) !important; margin-bottom: 0.5rem !important;">
        <div
            class="flex items-center space-x-3 text-xs uppercase tracking-[0.25em] whitespace-nowrap overflow-hidden grow">
            <span class="font-bold neon-text shrink-0">SYS_LINK //</span>
            <div class="flex items-center space-x-2 text-zinc-100 truncate">
                <button hx-get="/" hx-target="#aegis-view-core" hx-push-url="true"
                    class="text-zinc-100 hover:text-white cursor-pointer transition-colors bg-white/5 px-2 py-0.5 rounded shrink-0">DASHBOARD</button>
                <span class="opacity-100 text-zinc-200 shrink-0">/</span>
                {% for crumb in breadcrumbs %}
                <button hx-get="/files?path={{ crumb.path }}" hx-target="#aegis-view-core" hx-push-url="true"
                    class="text-zinc-100 hover:text-white cursor-pointer transition-colors bg-white/5 px-2 py-0.5 rounded shrink-0">{{
                    crumb.name }}</button>
                <span class="opacity-100 text-zinc-200 shrink-0">/</span>
                {% endfor %}
                <span class="text-white font-bold bg-white/10 px-2 py-0.5 rounded shadow-sm truncate">{{ filename
                    }}</span>
            </div>
        </div>
        <div class="flex items-center space-x-6 text-xs uppercase tracking-widest font-mono">
            <div id="save-notification" class="text-xs uppercase tracking-widest text-zinc-300"></div>
            <div class="flex items-center space-x-3">
                <button hx-post="/save" hx-include="#editor-form" hx-target="#save-notification"
                    class="btn-solid text-xs h-9 px-6 shadow-[0_0_15px_rgba(0,240,255,0.15)] hover:shadow-[0_0_20px_rgba(0,240,255,0.3)] transition-all">
                    <span>COMMIT_STABLE</span>
                </button>
                <button hx-get="/pdf/view?path={{ path }}" hx-target="#aegis-view-core" hx-push-url="true"
                    class="btn-ghost text-xs h-9 px-6 border border-(--neon-cyan-dim)/30 hover:border-(--neon-cyan) transition-all flex items-center space-x-2">
                    {% with class="w-3 h-3" %}{% include 'icons/pdf.html' %}{% endwith %}
                    <span>PRINT_DOCUMENT</span>
                </button>
            </div>
            <div class="flex items-center space-x-2 group pl-4 border-l border-white/10">
                <span class="text-zinc-100 font-bold">ST:</span>
                <span class="neon-text animate-pulse group-hover:neon-glow transition-all">HYBRID_ACTIVE</span>
            </div>
        </div>
    </div>

    <!-- Main Editor -->
    <div class="grow flex flex-col min-w-0 min-h-0 overflow-hidden glass-panel"
        style="width: 100% !important; background: rgba(15, 23, 42, 0.5) !important; border-top: none !important; border-radius: 0 0 4px 4px !important;">
        <form id="editor-form" class="grow flex flex-col w-full overflow-hidden relative m-0">
            <input type="hidden" name="path" value="{{ path }}">
            <textarea name="content" id="easymde-editor">{{ content }}</textarea>
        </form>
    </div>

    <script>
        (function () {
            const root = document.getElementById('editor-easymde-root');
            // AEGIS_COMPLETION_STATE: Persistent neural buffer
            let ghostMark = null;
            let ghostText = "";
            let isFetching = false;
            let abortController = null;

            const easyMDE = new EasyMDE({
                element: document.getElementById('easymde-editor'),
                forceSync: true,
                lineWrapping: true,
                autoDownloadFontAwesome: false,
                spellChecker: false,
                status: ["lines", "words", "cursor"],
                renderingConfig: {
                    singleLineBreaks: false,
                    codeSyntaxHighlighting: false,
                },
                previewRender: function (plainText, preview) {
                    // Use marked to generate HTML
                    const html = marked.parse(plainText);
                    // Schedule mermaid render once HTML is injected
                    setTimeout(renderAegisVisuals, 100);
                    return html;
                },
                toolbar: [
                    "bold", "italic", "heading", "|", 
                    "quote", "unordered-list", "ordered-list", "|", 
                    "link", "image", "table", "|", 
                    "preview", "side-by-side", "fullscreen", "|", 
                    {
                        name: "aegis-mermaid",
                        action: () => htmx.ajax('GET', '/api/oracle/mermaid-modal', {target: '#modal-container'}),
                        className: "fa fa-microchip",
                        title: "Mermaid Synthesis (Aegis Oracle)"
                    },
                    {
                        name: "aegis-ghost",
                        action: () => fetchNeuralSuggestion(),
                        className: "fa fa-magic",
                        title: "Neural Hint (Ghost-Text)"
                    },
                    "|",
                    {
                        name: "aegis-config",
                        action: () => htmx.ajax('GET', '/neural-settings', {target: '#modal-container'}),
                        className: "fa fa-cog",
                        title: "Uplink Settings (Aegis Oracle)"
                    },
                    "guide"
                ],
                theme: "dark"
            });
            window.aegisEditor = easyMDE;

            // Adjust EasyMDE for industrial look
            const cm = easyMDE.codemirror;

            // AEGIS_INPUT_PRIORITY: Hard-link Tab and Esc to Oracle protocols
            cm.setOption("extraKeys", {
                "Tab": (cm) => {
                    if (ghostText) {
                        cm.replaceSelection(ghostText);
                        window.clearAegisGhost();
                        return; // ACCEPTED
                    }
                    return EasyMDE.CodeMirror.Pass;
                },
                "Esc": (cm) => {
                    if (ghostText || isFetching) {
                        window.clearAegisGhost();
                        return; // CANCELLED
                    }
                    return EasyMDE.CodeMirror.Pass;
                }
            });

            window.clearAegisGhost = function() {
                if (abortController) {
                    abortController.abort();
                    abortController = null;
                }
                if (ghostMark) { ghostMark.clear(); ghostMark = null; }
                ghostText = "";
                isFetching = false;
            };

            async function fetchNeuralSuggestion() {
                if (isFetching) return;
                window.clearAegisGhost();
                cm.focus(); // AEGIS_FOCUS_RESTORE: Return focus to editor for single-tab acceptance
                
                const magicBtn = root.querySelector('.fa-magic');
                if (magicBtn) {
                    magicBtn.classList.remove('fa-magic');
                    magicBtn.classList.add('fa-circle-notch', 'fa-spin', 'text-(--neon-cyan)');
                }

                const pos = cm.getCursor();
                const context = cm.getRange({line: Math.max(0, pos.line - 15), ch: 0}, pos);
                if (!context.trim()) {
                    if (magicBtn) {
                        magicBtn.classList.remove('fa-circle-notch', 'fa-spin', 'text-(--neon-cyan)');
                        magicBtn.classList.add('fa-magic');
                    }
                    return;
                }

                isFetching = true;
                abortController = new AbortController();
                
                try {
                    const response = await fetch('/api/oracle/complete', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        signal: abortController.signal,
                        body: JSON.stringify({ prompt: context })
                    });

                    if (!response.ok) throw new Error("LINK_OFFLINE");

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    
                    while(true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n');
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.substring(6));
                                    if (data.token) {
                                        ghostText += data.token;
                                        renderGhostWidget(ghostText);
                                    }
                                } catch(e) {}
                            }
                        }
                    }
                } catch(e) {
                    if (e.name !== 'AbortError') {
                        console.error("ORACLE_UPLINK_ERROR:", e);
                    }
                } finally {
                    isFetching = false;
                    const magicBtn = root.querySelector('.fa-circle-notch.fa-spin');
                    if (magicBtn) {
                        magicBtn.classList.remove('fa-circle-notch', 'fa-spin', 'text-(--neon-cyan)');
                        magicBtn.classList.add('fa-magic');
                    }
                }
            }

            function renderGhostWidget(text) {
                cm.operation(() => {
                    if (ghostMark) ghostMark.clear();
                    const pos = cm.getCursor();
                    const span = document.createElement("span");
                    span.className = "aegis-ghost-text";
                    span.style.cssText = "opacity: 0.4; color: #a78bfa; font-style: italic; pointer-events: none;";
                    span.textContent = text;
                    ghostMark = cm.setBookmark(pos, { widget: span, insertLeft: false });
                });
            }

            cm.on("cursorActivity", () => {
                if (!isFetching) window.clearAegisGhost();
            });

            // AEGIS_PREVIEW_VISUALS: Watch for preview toggle
            const originalTogglePreview = easyMDE.togglePreview;
            easyMDE.togglePreview = function () {
                originalTogglePreview.apply(this, arguments);
                if (this.isPreviewActive()) {
                    setTimeout(renderAegisVisuals, 50);
                }
            };

            const originalToggleSideBySide = easyMDE.toggleSideBySide;
            easyMDE.toggleSideBySide = function () {
                originalToggleSideBySide.apply(this, arguments);
                if (this.isSideBySideActive()) {
                    setTimeout(renderAegisVisuals, 50);
                }
            };

            cm.on("update", () => {
                if (easyMDE.isSideBySideActive() || easyMDE.isPreviewActive()) {
                    renderAegisVisuals();
                }
            });

            // DAISY_TOOLTIP_CONVERSION: Convert all tooltips (standard and Aegis)
            setTimeout(() => {
                const toolbar = root.querySelector('.editor-toolbar');
                if (toolbar) {
                    toolbar.querySelectorAll('button').forEach(btn => {
                        const title = btn.getAttribute('title');
                        if (title && !btn.parentNode.classList.contains('tooltip')) {
                            const wrap = document.createElement('span');
                            wrap.className = 'tooltip tooltip-bottom align-middle';
                            wrap.setAttribute('data-tip', title);
                            btn.parentNode.insertBefore(wrap, btn);
                            wrap.appendChild(btn);
                            btn.removeAttribute('title'); 
                        }
                    });
                }
            }, 100);
        })();
    </script>

    <style>
        /* EasyMDE Industrial Overrides - Aegis Sky */
        .EasyMDEContainer {
            flex-grow: 1 !important;
            display: flex !important;
            flex-direction: column !important;
            min-height: 0 !important;
        }

        .editor-toolbar {
            background: rgba(15, 23, 42, 0.9) !important;
            border: none !important;
            border-bottom: 1px solid rgba(125, 211, 252, 0.15) !important;
            padding: 8px 24px !important;
            backdrop-filter: blur(10px) !important;
            border-radius: 0 !important;
        }

        .editor-toolbar button {
            color: #f1f5f9 !important;
            border: 1px solid transparent !important;
            margin: 0 2px !important;
            width: 32px !important;
            height: 32px !important;
        }

        .editor-toolbar button.active,
        .editor-toolbar button:hover {
            background: rgba(125, 211, 252, 0.12) !important;
            color: var(--neon-cyan) !important;
            border: 1px solid rgba(125, 211, 252, 0.3) !important;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.15);
        }

        .CodeMirror {
            flex-grow: 1 !important;
            background: transparent !important;
            border: none !important;
            color: #e2e8f0 !important;
            font-family: 'Inconsolata', monospace !important;
            font-weight: 300 !important;
            font-size: 16px !important;
            line-height: 1.6 !important;
            letter-spacing: -0.01em !important;
            padding: 20px !important;
        }

        .CodeMirror-scroll {
            padding-bottom: 50px !important;
        }

        .editor-statusbar {
            background: rgba(15, 23, 42, 0.6) !important;
            border: none !important;
            color: #94a3b8 !important;
            padding: 6px 24px !important;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.1em;
            border-top: 1px solid rgba(125, 211, 252, 0.1) !important;
        }

        .CodeMirror-cursor {
            border-left: 2px solid var(--neon-cyan) !important;
        }

        .CodeMirror-selected {
            background: rgba(56, 189, 248, 0.2) !important;
        }

        .CodeMirror-hscrollbar {
            display: none !important;
        }

        .CodeMirror-hscrollbar {
            display: none !important;
        }

        /* Aegis Surgical Clean-up: Solo overflow orizzontale interno */
        .CodeMirror-scroll {
            overflow-x: hidden !important;
            overflow-y: auto !important;
        }

        #editor-easymde-root,
        .editor-toolbar {
            overflow: visible !important;
        }

        /* Nasconde la scrollbar orizzontale in Webkit senza bloccare l'overflow verticale */
        .CodeMirror-scroll::-webkit-scrollbar:horizontal {
            height: 0px !important;
            display: none !important;
        }

        .editor-preview,
        .editor-preview-side {
            background: #0c0e14 !important;
            /* Deep Blue base but visible */
            color: #f1f5f9 !important;
            padding: 40px !important;
            font-family: 'Outfit', sans-serif !important;
            line-height: 1.8 !important;
        }

        .editor-preview-side {
            border-left: 1px solid rgba(125, 211, 252, 0.1) !important;
        }

        .editor-preview h1,
        .editor-preview-side h1 {
            font-size: 2.5rem !important;
            color: var(--neon-cyan) !important;
            font-weight: 800 !important;
            margin: 1.5em 0 0.5em !important;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2) !important;
            padding-bottom: 0.5rem !important;
        }

        .editor-preview h2,
        .editor-preview-side h2 {
            font-size: 2rem !important;
            color: var(--neon-cyan) !important;
            font-weight: 700 !important;
            margin: 1.2em 0 0.5em !important;
        }

        .editor-preview h3,
        .editor-preview-side h3 {
            font-size: 1.5rem !important;
            color: var(--neon-cyan) !important;
            font-weight: 600 !important;
            margin: 1.1em 0 0.5em !important;
        }

        .editor-preview p,
        .editor-preview-side p {
            margin-bottom: 1.25em !important;
            color: #cbd5e1 !important;
        }

        .editor-preview code,
        .editor-preview-side code {
            background: rgba(125, 211, 252, 0.1) !important;
            padding: 2px 4px !important;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace !important;
            color: var(--neon-cyan) !important;
        }

        .editor-preview pre,
        .editor-preview-side pre {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(125, 211, 252, 0.1) !important;
            padding: 1.5rem !important;
            border-radius: 8px !important;
            margin: 1.5rem 0 !important;
        }

        .editor-preview a,
        .editor-preview-side a {
            color: var(--neon-cyan) !important;
            text-decoration: underline !important;
        }

        .editor-preview ul,
        .editor-preview-side ul {
            list-style-type: disc !important;
            padding-left: 2rem !important;
            margin-bottom: 1.25em !important;
        }

        .editor-preview ol,
        .editor-preview-side ol {
            list-style-type: decimal !important;
            padding-left: 2rem !important;
            margin-bottom: 1.25em !important;
        }

        .editor-preview blockquote,
        .editor-preview-side blockquote {
            border-left: 4px solid var(--neon-cyan) !important;
            padding-left: 1.5rem !important;
            font-style: italic !important;
            background: rgba(56, 189, 248, 0.05) !important;
            padding: 1rem 1.5rem !important;
            margin: 1.5rem 0 !important;
        }

        /* Fullscreen Breakthrough Protocol */
        .mde-fs-active {
            position: static !important;
        }

        .mde-fs-active .glass-panel {
            backdrop-filter: none !important;
            transform: none !important;
            position: static !important;
        }

        .CodeMirror-fullscreen,
        .editor-toolbar.fullscreen,
        .editor-preview-side.editor-preview-active-side {
            z-index: 99999 !important;
            position: fixed !important;
        }

        .CodeMirror-fullscreen {
            background: #0c0e14 !important;
            top: 50px !important;
            /* Under toolbar */
        }

        .editor-toolbar.fullscreen {
            background: rgba(15, 23, 42, 0.98) !important;
            border-bottom: 1px solid rgba(125, 211, 252, 0.3) !important;
            height: 50px !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
        }
    </style>
</div>
