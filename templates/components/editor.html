<div id="editor-easymde-root" style="width: 100% !important; height: 85vh !important; display: flex !important; flex-direction: column !important; overflow: hidden !important; min-width: 0 !important; background: transparent !important;">
    
    <!-- Row 1: Status & Context -->
    <div class="glass-panel px-6 py-3 flex items-center justify-between border-b-0 rounded-b-none shrink-0" style="background: rgba(20, 20, 25, 0.8) !important; margin-bottom: 0.5rem !important;">
        <div class="flex items-center space-x-3 text-xs uppercase tracking-[0.25em] whitespace-nowrap overflow-hidden flex-grow">
            <span class="font-bold neon-text shrink-0">SYS_LINK //</span>
            <div class="flex items-center space-x-2 text-zinc-100 truncate">
                <button hx-get="/" hx-target="#aegis-view-core" hx-push-url="true" class="text-zinc-100 hover:text-white cursor-pointer transition-colors bg-white/5 px-2 py-0.5 rounded shrink-0">DASHBOARD</button>
                <span class="opacity-100 text-zinc-200 shrink-0">/</span>
                {% for crumb in breadcrumbs %}
                <button hx-get="/files?path={{ crumb.path }}" hx-target="#aegis-view-core" hx-push-url="true" class="text-zinc-100 hover:text-white cursor-pointer transition-colors bg-white/5 px-2 py-0.5 rounded shrink-0">{{ crumb.name }}</button>
                <span class="opacity-100 text-zinc-200 shrink-0">/</span>
                {% endfor %}
                <span class="text-white font-bold bg-white/10 px-2 py-0.5 rounded shadow-sm truncate">{{ filename }}</span>
            </div>
        </div>
        <div class="flex items-center space-x-6 text-xs uppercase tracking-widest font-mono">
            <div id="save-notification" class="text-xs uppercase tracking-widest text-zinc-300"></div>
            <button hx-post="/save" hx-include="#editor-form" hx-target="#save-notification"
                    class="btn-solid text-xs h-9 px-6 shadow-[0_0_15px_rgba(0,240,255,0.15)] hover:shadow-[0_0_20px_rgba(0,240,255,0.3)] transition-all">
                <span>COMMIT_STABLE</span>
            </button>
            <div class="flex items-center space-x-2 group pl-4 border-l border-white/10">
                <span class="text-zinc-100 font-bold">ST:</span>
                <span class="neon-text animate-pulse group-hover:neon-glow transition-all">HYBRID_ACTIVE</span>
            </div>
        </div>
    </div>

    <!-- Main Editor -->
    <div class="flex-grow flex flex-col min-w-0 min-h-0 overflow-hidden glass-panel" style="width: 100% !important; background: rgba(10, 10, 15, 0.6) !important;">
        <form id="editor-form" class="flex-grow flex flex-col w-full overflow-hidden relative m-0">
            <input type="hidden" name="path" value="{{ path }}">
            <textarea name="content" id="easymde-editor">{{ content }}</textarea>
        </form>
    </div>

    <script>
        (function() {
            const root = document.getElementById('editor-easymde-root');
            const easyMDE = new EasyMDE({
                element: document.getElementById('easymde-editor'),
                forceSync: true,
                autoDownloadFontAwesome: false,
                spellChecker: false,
                status: ["lines", "words", "cursor"],
                renderingConfig: {
                    singleLineBreaks: false,
                    codeSyntaxHighlighting: true,
                },
                toolbar: ["bold", "italic", "heading", "|", "quote", "unordered-list", "ordered-list", "|", "link", "image", "table", "|", "preview", "side-by-side", "fullscreen", "|", "guide"],
                theme: "dark"
            });

            // Adjust EasyMDE for industrial look
            const cm = easyMDE.codemirror;
            
            // Fullscreen Breakout Logic
            easyMDE.codemirror.on("refresh", () => {
                if (easyMDE.isFullscreenActive()) {
                    root.classList.add('mde-fs-active');
                } else {
                    root.classList.remove('mde-fs-active');
                }
            });

            // Sync content for HTMX form submission
            cm.on("change", () => {
                easyMDE.element.value = easyMDE.value();
            });
        })();
    </script>

    <style>
        /* EasyMDE Industrial Overrides */
        .EasyMDEContainer { flex-grow: 1 !important; display: flex !important; flex-direction: column !important; min-height: 0 !important; }
        .editor-toolbar { 
            background: rgba(10, 10, 15, 0.8) !important; 
            border: none !important; 
            border-bottom: 1px solid rgba(255,255,255,0.05) !important; 
            padding: 8px 24px !important; 
            backdrop-filter: blur(10px) !important;
            border-radius: 0 !important;
        }
        .editor-toolbar button { color: #f4f4f5 !important; border: 1px solid transparent !important; margin: 0 2px !important; width: 32px !important; height: 32px !important; }
        .editor-toolbar button.active, .editor-toolbar button:hover { 
            background: rgba(0, 240, 255, 0.1) !important; 
            color: #00f0ff !important; 
            border: 1px solid rgba(0, 240, 255, 0.3) !important; 
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }
        .CodeMirror { 
            flex-grow: 1 !important; 
            background: transparent !important; 
            border: none !important; 
            color: #f4f4f5 !important; 
            font-family: 'JetBrains Mono', monospace !important; 
            font-size: 16px !important; 
            line-height: 1.8 !important;
            padding: 20px !important;
        }
        .CodeMirror-scroll { padding-bottom: 50px !important; }
        .editor-statusbar { background: rgba(0,0,0,0.4) !important; border: none !important; color: #a1a1aa !important; padding: 6px 24px !important; text-transform: uppercase; font-size: 10px; letter-spacing: 0.1em; border-top: 1px solid rgba(255,255,255,0.05) !important; }
        .CodeMirror-cursor { border-left: 2px solid #00f0ff !important; }
        .CodeMirror-selected { background: rgba(0, 240, 255, 0.15) !important; }
        
        /* Modal Fixes */
        /* Preview Typography (Aegis Prose) */
        .editor-preview, .editor-preview-side { 
            background: #0a0a0f !important; 
            color: #f4f4f5 !important; 
            padding: 40px !important; 
            font-family: 'Outfit', sans-serif !important;
            line-height: 1.8 !important;
        }
        .editor-preview-side { border-left: 1px solid rgba(255,255,255,0.1) !important; }
        
        .editor-preview h1, .editor-preview-side h1 { font-size: 2.5rem !important; color: #00f0ff !important; font-weight: 800 !important; margin: 1.5em 0 0.5em !important; border-bottom: 1px solid rgba(0, 240, 255, 0.2) !important; padding-bottom: 0.5rem !important; }
        .editor-preview h2, .editor-preview-side h2 { font-size: 2rem !important; color: #00f0ff !important; font-weight: 700 !important; margin: 1.2em 0 0.5em !important; }
        .editor-preview h3, .editor-preview-side h3 { font-size: 1.5rem !important; color: #00f0ff !important; font-weight: 600 !important; margin: 1.1em 0 0.5em !important; }
        .editor-preview p, .editor-preview-side p { margin-bottom: 1.25em !important; color: #f4f4f5 !important; }
        .editor-preview code, .editor-preview-side code { background: rgba(255,255,255,0.05) !important; padding: 2px 4px !important; border-radius: 4px; font-family: 'JetBrains Mono', monospace !important; color: #00f0ff !important; }
        .editor-preview pre, .editor-preview-side pre { background: rgba(0,0,0,0.4) !important; border: 1px solid rgba(255,255,255,0.05) !important; padding: 1.5rem !important; border-radius: 8px !important; margin: 1.5rem 0 !important; }
        .editor-preview a, .editor-preview-side a { color: #00f0ff !important; text-decoration: underline !important; }
        .editor-preview ul, .editor-preview-side ul { list-style-type: disc !important; padding-left: 2rem !important; margin-bottom: 1.25em !important; }
        .editor-preview ol, .editor-preview-side ol { list-style-type: decimal !important; padding-left: 2rem !important; margin-bottom: 1.25em !important; }
        .editor-preview blockquote, .editor-preview-side blockquote { border-left: 4px solid #00f0ff !important; padding-left: 1.5rem !important; font-style: italic !important; background: rgba(0, 240, 255, 0.05) !important; padding: 1rem 1.5rem !important; margin: 1.5rem 0 !important; }

        /* Fullscreen Breakthrough Protocol */
        .mde-fs-active { position: static !important; }
        .mde-fs-active .glass-panel { backdrop-filter: none !important; transform: none !important; position: static !important; }
        .CodeMirror-fullscreen, .editor-toolbar.fullscreen, .editor-preview-side.editor-preview-active-side {
            z-index: 99999 !important;
            position: fixed !important;
        }
        .CodeMirror-fullscreen {
            background: #0a0a0f !important;
            top: 50px !important; /* Under toolbar */
        }
        .editor-toolbar.fullscreen {
            background: rgba(10, 10, 15, 0.98) !important;
            border-bottom: 1px solid rgba(0, 240, 255, 0.3) !important;
            height: 50px !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
        }
    </style>
</div>
