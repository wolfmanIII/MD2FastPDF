<div id="editor-root" class="glass-panel w-full max-w-full overflow-hidden relative tracking-widest mb-12">
    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-3 neon-border-b shrink-0 relative z-10 bg-black/40">
        <div class="flex items-center space-x-2 text-[10px] uppercase overflow-x-auto no-scrollbar">
            <span class="font-bold shrink-0 neon-dim">MODE_EDIT //</span>
            {% for crumb in breadcrumbs %}
            <button hx-get="/files?path={{ crumb.path }}" 
                    hx-target="#aegis-view-core" hx-push-url="true"
                    class="aegis-link transition-colors whitespace-nowrap px-2 py-0.5 rounded-sm">
                {{ crumb.name }}
            </button>
            <span class="neon-dim">/</span>
            {% endfor %}
            <span class="neon-text font-bold whitespace-nowrap drop-shadow-[0_0_8px_rgba(0,240,255,0.8)]">{{ filename }}</span>
        </div>
        <div class="flex items-center space-x-1">
            <div id="save-notification" class="flex items-center"></div>
            <button hx-get="/pdf/view?path={{ path }}" hx-target="#aegis-view-core"
                    class="btn-ghost text-[10px] rounded-sm flex items-center space-x-2">
                {% with class="w-3 h-3" %}{% include 'icons/pdf.html' %}{% endwith %}
                <span>GENERATE_PDF</span>
            </button>
            <button hx-post="/save" hx-include="#editor-form" hx-target="#save-notification"
                    class="btn-solid text-[10px] rounded-sm">
                <span>COMMIT_CHANGES</span>
            </button>
        </div>
    </div>

    <!-- Hidden form for HTMX -->
    <form id="editor-form" class="hidden">
        <input type="hidden" name="path" value="{{ path }}">
        <textarea name="content" id="mde-content"></textarea>
    </form>

    <style>
        /* TOOLBAR STABILIZATION */
        .editor-toolbar {
            display: flex !important;
            flex-wrap: wrap !important;
            padding: 4px 8px !important;
            gap: 2px !important;
            align-items: center !important;
            border: none !important;
            border-bottom: 1px solid rgba(0, 240, 255, 0.1) !important;
        }
        .editor-toolbar button {
            width: 28px !important;
            height: 28px !important;
            padding: 0 !important;
            margin: 0 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            opacity: 0.8;
            transition: all 0.2s ease;
        }
        .editor-toolbar button:hover { opacity: 1; transform: scale(1.1); }
        .editor-toolbar i.separator { 
            height: 14px !important; 
            margin: 0 4px !important; 
            border-left: 1px solid rgba(0, 240, 255, 0.15) !important; 
        }

        /* Fullscreen & Side-by-Side stabilization */
        body.aegis-fullscreen-active .editor-toolbar {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            z-index: 1005 !important;
            background: #111 !important;
            border-bottom: 1px solid var(--neon-cyan) !important;
        }

        body.aegis-fullscreen-active .CodeMirror {
            margin-top: 40px !important;
        }

        /* Logic: In side-by-side, editor takes 50%, preview takes 50% */
        body.aegis-fullscreen-active:has(.editor-preview-active-side) .CodeMirror {
            width: 50% !important;
        }

        /* CONTAINER LOCK & SCROLLBAR FIX */
        .CodeMirror, .EasyMDEContainer {
            max-width: 100% !important;
            overflow: hidden !important; 
        }
        .CodeMirror-lines { word-wrap: break-word !important; }

        .editor-preview-side {
            position: fixed !important;
            top: 0 !important;
            bottom: 0 !important;
            right: 0 !important;
            width: 50% !important;
            height: 100% !important;
            z-index: 1001 !important;
            background: #050505 !important;
            border-left: 2px solid var(--neon-cyan) !important;
            overflow-y: auto !important;
        }

        body.aegis-fullscreen-active .editor-preview-side {
            top: 40px !important; /* Below the fixed toolbar */
            height: calc(100% - 40px) !important;
        }
        
        #editor-wrapper {
            width: 100% !important;
            min-width: 0 !important;
        }
        
        /* Disable glass effect on active editor root to fix transparency */
        #editor-root:has(.CodeMirror-fullscreen),
        #editor-root:has(.editor-preview-active-side) {
            backdrop-filter: none !important;
            background: #050505 !important;
        }
    </style>

    <!-- Editor Wrapper -->
    <div id="editor-wrapper" class="w-full overflow-hidden">
        <textarea id="easymde-textarea">{{ content }}</textarea>
    </div>

    <script>
        (function() {
            setTimeout(() => {
                const easyMDE = new EasyMDE({
                    element: document.getElementById('easymde-textarea'),
                    spellChecker: false,
                    autofocus: true,
                    forceSync: true,
                    lineWrapping: true,
                    minHeight: "450px",
                    status: ["lines", "words", "cursor"],
                    renderingConfig: {
                        codeSyntaxHighlighting: true,
                        hljs: window.hljs
                    },
                    previewRender: function(plainText, preview) {
                        setTimeout(() => {
                            const mermaidBlocks = preview.querySelectorAll('pre code.language-mermaid');
                            mermaidBlocks.forEach((block, index) => {
                                const raw = block.innerText;
                                const id = 'mermaid-' + Date.now() + '-' + index;
                                const container = block.parentElement;
                                container.innerHTML = `<div class="mermaid" id="${id}">${raw}</div>`;
                                try {
                                    mermaid.init(undefined, container.querySelector('.mermaid'));
                                } catch (e) {
                                    container.innerHTML = `<div class="p-4 bg-red-900/20 border border-red-500/50 text-red-500 text-xs">MERMAID_SYNTAX_ERROR: ${e.message}</div>`;
                                }
                            });
                        }, 50);
                        return easyMDE.markdown(plainText);
                    },
                    toolbar: ["bold", "italic", "heading", "|", "quote", "unordered-list", "ordered-list", "|", "link", "image", "table", "|", "preview", "side-by-side", "fullscreen", "|", "guide"]
                });

                // Sync with hidden form
                const hidden = document.getElementById('mde-content');
                easyMDE.codemirror.on("change", () => { hidden.value = easyMDE.value(); });
                hidden.value = easyMDE.value();

                // Viewport Stability for Fullscreen
                const updateModes = () => {
                    if (easyMDE.isFullscreenActive() || easyMDE.isSideBySideActive()) {
                        document.body.classList.add('aegis-fullscreen-active');
                    } else {
                        document.body.classList.remove('aegis-fullscreen-active');
                    }
                };
                easyMDE.codemirror.on("refresh", updateModes);

                let stabilizationCycles = 0;
                const stabilizer = setInterval(() => {
                    easyMDE.codemirror.refresh();
                    if (++stabilizationCycles >= 5) clearInterval(stabilizer);
                }, 200);
            }, 5);
        })();
    </script>
</div>
