<div id="editor-easymde-root">

    <link rel="stylesheet" href="/static/css/editor-aegis.css">

    <!-- Row 1: Status & Context -->
    <div class="aegis-editor-header glass-panel px-4 py-3 flex items-center justify-between border-b-0 rounded-b-none shrink-0">
        <div
            class="flex items-center space-x-3 text-xs uppercase tracking-[0.25em] whitespace-nowrap overflow-hidden grow">
            <div id="aegis-filetree-toggle-wrap" class="tooltip tooltip-bottom shrink-0" data-tip="Toggle Archive Tree">
                <button onclick="aegisTreeToggleSidebar()"
                    class="w-6 h-6 flex items-center justify-center rounded-sm hover:bg-(--neon-cyan)/10 transition-colors cursor-pointer border-none bg-transparent">
                    <i id="aegis-filetree-icon" class="fa fa-folder-tree text-(--neon-cyan) text-[11px]"></i>
                </button>
            </div>
            <span class="text-zinc-600">|</span>
            <span class="font-bold neon-text shrink-0">SYS_LINK //</span>
            <div class="flex items-center space-x-2 text-zinc-100 truncate">
                <a href="/" hx-get="/" hx-target="#aegis-view-core" hx-push-url="true"
                    class="text-zinc-100 hover:text-white cursor-pointer transition-colors bg-white/5 px-2 py-0.5 rounded shrink-0 no-underline">DASHBOARD</a>
                <span class="opacity-100 text-zinc-200 shrink-0">/</span>
                {% for crumb in breadcrumbs %}
                <a href="/files?path={{ crumb.path }}" hx-get="/files?path={{ crumb.path }}"
                    hx-target="#aegis-view-core" hx-push-url="true"
                    class="text-zinc-100 hover:text-white cursor-pointer transition-colors bg-white/5 px-2 py-0.5 rounded shrink-0 no-underline">{{
                    crumb.name }}</a>
                <span class="opacity-100 text-zinc-200 shrink-0">/</span>
                {% endfor %}
                <span class="text-white font-bold bg-white/10 px-2 py-0.5 rounded shadow-sm truncate">{{ filename
                    }}</span>
            </div>
        </div>
        <div class="flex items-center space-x-6 text-xs uppercase tracking-widest font-mono">
            <div id="save-notification" class="text-xs uppercase tracking-widest text-zinc-300"></div>
            <div class="flex items-center space-x-3"></div>
            <div class="flex items-center space-x-2 group pl-4 border-l border-white/10">
                <span class="text-zinc-100 font-bold">ST:</span>
                <span class="neon-text animate-pulse group-hover:neon-glow transition-all">HYBRID_ACTIVE</span>
            </div>
        </div>
    </div>

    <!-- Main Editor Row -->
    <div class="aegis-editor-main grow flex min-w-0 min-h-0 overflow-hidden glass-panel">

        <!-- FILETREE SIDEBAR -->
        <div id="aegis-filetree">
            <div id="aegis-filetree-inner" hx-get="/tree?active={{ path }}" hx-trigger="load delay:50ms"
                hx-target="this" hx-swap="innerHTML" class="h-full overflow-y-auto overflow-x-hidden">
                <div class="p-3 text-[10px] text-zinc-600 tracking-widest animate-pulse uppercase">SCANNING_ARCHIVE...
                </div>
            </div>
        </div>

        <!-- EDITOR FORM -->
        <form id="editor-form" class="grow flex flex-col min-w-0 overflow-hidden relative m-0">
            <input type="hidden" name="path" value="{{ path }}">
            <textarea name="content" id="easymde-editor">{{ content }}</textarea>
        </form>
    </div>

    <!-- AEGIS_NEURAL_SCAN_OVERLAY: Top-level fixed elevation -->
    <div id="editor-scan-overlay"
        class="fixed inset-0 bg-black/80 backdrop-blur-xs flex flex-col items-center justify-center z-9999 rounded-sm border border-(--neon-cyan)/30 shadow-[inset_0_0_50px_rgba(0,240,255,0.1)]">
        <div class="flex flex-col items-center space-y-4">
            <i
                class="fa fa-microchip fa-spin text-4xl text-(--neon-cyan) drop-shadow-[0_0_15px_rgba(0,240,255,0.8)]"></i>
            <p class="text-[11px] tracking-[0.4em] font-bold text-white animate-pulse uppercase">
                NEURAL_DECRYPTION_IN_PROGRESS</p>
        </div>
    </div>

    <script>
        (function () {
            const root = document.getElementById('editor-easymde-root');
            // AEGIS_COMPLETION_STATE: Persistent neural buffer
            let ghostMark = null;
            let ghostText = "";
            let isFetching = false;
            let abortController = null;

            const easyMDE = new EasyMDE({
                element: document.getElementById('easymde-editor'),
                forceSync: true,
                lineWrapping: true,
                autoDownloadFontAwesome: false,
                spellChecker: false,
                status: ["lines", "words", "cursor"],
                renderingConfig: {
                    singleLineBreaks: false,
                    codeSyntaxHighlighting: false,
                },
                previewRender: function (plainText, preview) {
                    // Use marked to generate HTML
                    const html = marked.parse(plainText);
                    // Schedule mermaid render once HTML is injected
                    setTimeout(renderAegisVisuals, 100);
                    return html;
                },
                toolbar: [
                    "bold", "italic", "heading", "|",
                    "quote", "unordered-list", "ordered-list", "|",
                    "link", "image", "table", "|",
                    "preview", "side-by-side", "fullscreen", "|",
                    {
                        name: "aegis-oracle-scan",
                        action: () => {
                            const content = easyMDE.value();
                            document.getElementById('editor-scan-overlay').style.display = 'flex';
                            htmx.ajax('POST', '/api/oracle/summarize', {
                                target: '#modal-container',
                                values: { content: content },
                                swap: 'innerHTML'
                            }).then(() => {
                                document.getElementById('editor-scan-overlay').style.display = 'none';
                            });
                        },
                        className: "fa fa-microchip",
                        title: "Neural Scan (summarize document)"
                    },
                    {
                        name: "aegis-mermaid",
                        action: () => htmx.ajax('GET', '/api/oracle/mermaid-modal', { target: '#modal-container' }),
                        className: "fa-solid fa-sitemap",
                        title: "Mermaid Synthesis (Aegis Oracle)"
                    },
                    {
                        name: "aegis-ghost",
                        action: () => fetchNeuralSuggestion(),
                        className: "fa-brands fa-uncharted",
                        title: "Neural Hint (Ghost-Text)"
                    },
                    {
                        name: "aegis-render",
                        action: () => htmx.ajax('GET', '/render/mermaid/list?path={{ path }}', { target: '#modal-container' }),
                        className: "fa fa-image",
                        title: "Export Mermaid Diagram (PNG)"
                    },
                    {
                        name: "aegis-render-all",
                        action: () => window.location.href = '/render/mermaid/bulk?path={{ path }}',
                        className: "fa fa-file-zipper",
                        title: "Export All Mermaid Diagrams (ZIP)"
                    },
                    {
                        name: "aegis-blueprint",
                        action: () => htmx.ajax('GET', '/blueprints/modal', { target: '#modal-container' }),
                        className: "fa fa-book-open",
                        title: "Blueprint Archive"
                    },
                    "|",
                    {
                        name: "aegis-save",
                        action: () => htmx.ajax('POST', '/save', { target: '#save-notification', source: '#editor-form' }),
                        className: "fa fa-floppy-disk",
                        title: "Commit Stable (Save)"
                    },
                    {
                        name: "aegis-print",
                        action: () => htmx.ajax('GET', '/pdf/view?path={{ path }}', { target: '#aegis-view-core', pushUrl: true }),
                        className: "fa fa-file-pdf",
                        title: "Print Document (PDF)"
                    },
                    "guide"
],
                theme: "dark"
            });
            window.aegisEditor = easyMDE;
            const cm = easyMDE.codemirror;

            // AEGIS_HUD_SYNC: Force root state and body scroll to match editor mode
            const syncHUD = () => {
                const isFull = easyMDE.isFullscreenActive();
                const isSide = easyMDE.isSideBySideActive();
                const isPrev = easyMDE.isPreviewActive();
                
                // AEGIS_FULLSCREEN_BREAKTHROUGH: Re-enable for CSS overrides
                root.classList.toggle('aegis-fullscreen-active', isFull);
                
                if (isFull || isSide || isPrev) {
                    document.body.style.setProperty('overflow', 'hidden', 'important');
                } else {
                    // Force restoration of scroll - removing the inline style entirely
                    document.body.style.removeProperty('overflow');
                    document.documentElement.style.removeProperty('overflow');
                    // Fallback for tricky scenarios
                    if (window.getComputedStyle(document.body).overflow === 'hidden') {
                        document.body.style.setProperty('overflow', 'visible', 'important');
                    }
                }
            };

            // Enhanced overrides with state-settlement delay
            const originalToggleFS = easyMDE.toggleFullScreen;
            easyMDE.toggleFullScreen = function () {
                originalToggleFS.apply(this, arguments);
                setTimeout(syncHUD, 0);
            };

            const originalToggleSide = easyMDE.toggleSideBySide;
            easyMDE.toggleSideBySide = function () {
                originalToggleSide.apply(this, arguments);
                setTimeout(syncHUD, 0);
                setTimeout(renderAegisVisuals, 50);
            };

            const originalTogglePreview = easyMDE.togglePreview;
            easyMDE.togglePreview = function () {
                originalTogglePreview.apply(this, arguments);
                setTimeout(syncHUD, 0);
                if (this.isPreviewActive()) {
                    setTimeout(renderAegisVisuals, 50);
                    // AEGIS_TOOLBAR_SYNC_PREVIEW: Force re-enable operational controllers
                    root.querySelectorAll('.editor-toolbar button.aegis-op-btn').forEach(btn => {
                        btn.disabled = false;
                        btn.classList.remove('disabled');
                    });
                }
            };

            // Sync on refresh for keybindings and internal state changes
            cm.on("refresh", syncHUD);
            cm.on("update", syncHUD);

            // ESCAPE_PROTOCOL: Ensure scroll is restored even on hard escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') setTimeout(syncHUD, 100);
            });

            // AEGIS_INPUT_PRIORITY: Hard-link Tab and Esc to Oracle protocols
            cm.setOption("extraKeys", {
                "Tab": (cm) => {
                    if (ghostText) {
                        cm.replaceSelection(ghostText);
                        window.clearAegisGhost();
                        return; // ACCEPTED
                    }
                    return EasyMDE.CodeMirror.Pass;
                },
                "Esc": (cm) => {
                    if (ghostText || isFetching) {
                        window.clearAegisGhost();
                        return; // CANCELLED
                    }
                    return EasyMDE.CodeMirror.Pass;
                }
            });

            window.clearAegisGhost = function () {
                if (abortController) {
                    abortController.abort();
                    abortController = null;
                }
                if (ghostMark) { ghostMark.clear(); ghostMark = null; }
                ghostText = "";
                isFetching = false;
            };

            async function fetchNeuralSuggestion() {
                if (isFetching) return;
                window.clearAegisGhost();
                cm.focus(); // AEGIS_FOCUS_RESTORE: Return focus to editor for single-tab acceptance

                const magicBtn = root.querySelector('.fa-uncharted');
                if (magicBtn) {
                    magicBtn.classList.remove('fa-brands', 'fa-uncharted');
                    magicBtn.classList.add('fa', 'fa-circle-notch', 'fa-spin', 'text-(--neon-cyan)');
                }

                const pos = cm.getCursor();
                const context = cm.getRange({ line: Math.max(0, pos.line - 15), ch: 0 }, pos);
                if (!context.trim()) {
                    if (magicBtn) {
                        magicBtn.classList.remove('fa', 'fa-circle-notch', 'fa-spin', 'text-(--neon-cyan)');
                        magicBtn.classList.add('fa-brands', 'fa-uncharted');
                    }
                    return;
                }

                isFetching = true;
                abortController = new AbortController();

                try {
                    const response = await fetch('/api/oracle/complete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        signal: abortController.signal,
                        body: JSON.stringify({ prompt: context })
                    });

                    if (!response.ok) throw new Error("LINK_OFFLINE");

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n');
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.substring(6));
                                    if (data.token) {
                                        ghostText += data.token;
                                        renderGhostWidget(ghostText);
                                    } else if (data.error === "NEURAL_LINK_DISABLED") {
                                        throw new Error("NEURAL_PROTOCOL_OFFLINE");
                                    }
                                } catch (e) {
                                    if (e.message === "NEURAL_PROTOCOL_OFFLINE") throw e;
                                }
                            }
                        }
                    }
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        console.error("ORACLE_UPLINK_ERROR:", e);
                        const notifier = document.getElementById('save-notification');
                        if (notifier) {
                            notifier.innerHTML = '<span class="text-red-500 neon-text-red">!! NEURAL_PROTOCOL_OFFLINE !!</span>';
                            setTimeout(() => { 
                                if (notifier.innerText.includes('NEURAL')) notifier.innerHTML = ''; 
                            }, 3000);
                        }
                    }
                } finally {
                    isFetching = false;
                    const magicBtn = root.querySelector('.fa-circle-notch.fa-spin');
                    if (magicBtn) {
                        magicBtn.classList.remove('fa', 'fa-circle-notch', 'fa-spin', 'text-(--neon-cyan)');
                        magicBtn.classList.add('fa-brands', 'fa-uncharted');
                    }
                }
            }

            function renderGhostWidget(text) {
                cm.operation(() => {
                    if (ghostMark) ghostMark.clear();
                    const pos = cm.getCursor();
                    const span = document.createElement("span");
                    span.className = "aegis-ghost-text";
                    span.style.cssText = "opacity: 0.8; color: #a78bfa; font-style: italic; pointer-events: none;";
                    span.textContent = text;
                    ghostMark = cm.setBookmark(pos, { widget: span, insertLeft: false });
                });
            }

            cm.on("cursorActivity", () => {
                if (!isFetching) window.clearAegisGhost();
            });

            // AEGIS_FILETREE: Sidebar toggle with localStorage persistence
            (function () {
                const sidebar = document.getElementById('aegis-filetree');
                const icon = document.getElementById('aegis-filetree-icon');
                const collapsed = localStorage.getItem('aegis-filetree-collapsed') === 'true';
                if (collapsed) {
                    sidebar.style.width = '0px';
                    if (icon) icon.style.opacity = '0.3';
                }

                window.aegisTreeToggleSidebar = function () {
                    const isCollapsed = sidebar.style.width === '0px';
                    sidebar.style.width = isCollapsed ? '260px' : '0px';
                    if (icon) icon.style.opacity = isCollapsed ? '1' : '0.3';
                    localStorage.setItem('aegis-filetree-collapsed', isCollapsed ? 'false' : 'true');
                };

                function _updateTreeState(path, isExpanded) {
                    const expanded = JSON.parse(localStorage.getItem('aegis-filetree-expanded') || '[]');
                    if (isExpanded && !expanded.includes(path)) {
                        expanded.push(path);
                    } else if (!isExpanded) {
                        const idx = expanded.indexOf(path);
                        if (idx > -1) expanded.splice(idx, 1);
                    }
                    localStorage.setItem('aegis-filetree-expanded', JSON.stringify(expanded));
                }

                window.aegisTreeToggle = function (btn) {
                    const dir = btn.closest('.filetree-dir');
                    const children = dir.querySelector('.filetree-children');
                    const iconClosed = btn.querySelector('.folder-icon-closed');
                    const iconOpen = btn.querySelector('.folder-icon-open');
                    const loaded = dir.dataset.loaded === 'true';

                    if (!loaded) {
                        htmx.ajax('GET', '/tree/expand?path=' + encodeURIComponent(dir.dataset.path) + '&active={{ path }}', {
                            target: children,
                            swap: 'innerHTML'
                        });
                        dir.dataset.loaded = 'true';
                        children.classList.remove('hidden');
                        iconClosed.classList.add('hidden');
                        iconOpen.classList.remove('hidden');
                        _updateTreeState(dir.dataset.path, true);
                    } else {
                        const isHidden = children.classList.toggle('hidden');
                        iconClosed.classList.toggle('hidden', !isHidden);
                        iconOpen.classList.toggle('hidden', isHidden);
                        _updateTreeState(dir.dataset.path, !isHidden);
                    }
                };

                // AEGIS_FILETREE_SEED: Ensure active path is expanded in state
                (function () {
                    const activePath = "{{ path }}";
                    const segments = activePath.split('/');
                    if (segments.length > 1) {
                        const expanded = JSON.parse(localStorage.getItem('aegis-filetree-expanded') || '[]');
                        let current = "";
                        let modified = false;
                        for (let i = 0; i < segments.length - 1; i++) {
                            current = current ? `${current}/${segments[i]}` : segments[i];
                            if (!expanded.includes(current)) {
                                expanded.push(current);
                                modified = true;
                            }
                        }
                        if (modified) {
                            localStorage.setItem('aegis-filetree-expanded', JSON.stringify(expanded));
                        }
                    }
                })();

                // AEGIS_FILETREE_RESTORE: Persistent expansion logic
                if (window._aegisTreeRestoreBound) {
                    document.body.removeEventListener('htmx:afterSettle', window._aegisTreeRestoreBound);
                }

                window._aegisTreeRestoreBound = function (evt) {
                    const target = evt.detail.target;
                    if (!target.closest('#aegis-filetree')) return;

                    const expanded = JSON.parse(localStorage.getItem('aegis-filetree-expanded') || '[]');
                    // Use a more aggressive lookup for deep path settlement
                    expanded.forEach(path => {
                        const dir = document.querySelector(`#aegis-filetree .filetree-dir[data-path="${path}"]`);
                        if (dir && dir.dataset.loaded === 'false') {
                            const btn = dir.querySelector('button');
                            if (btn) window.aegisTreeToggle(btn);
                        }
                    });

                    // AEGIS_VIEWPORT_SYNC: Scroll active file into view
                    setTimeout(() => {
                        const activeFile = document.querySelector('#aegis-filetree [data-aegis-active="true"]');
                        if (activeFile) {
                            console.log("AEGIS_SIDEBAR // SCROLL_SYNC // SUCCESS");
                            activeFile.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                        }
                    }, 150);
                };

                document.body.addEventListener('htmx:afterSettle', window._aegisTreeRestoreBound);

            })();

            cm.on("update", () => {
                if (easyMDE.isSideBySideActive() || easyMDE.isPreviewActive()) {
                    renderAegisVisuals();
                }
            });

            // DAISY_TOOLTIP_CONVERSION: Convert all tooltips (standard and Aegis)
            setTimeout(() => {
                const toolbar = root.querySelector('.editor-toolbar');
                if (toolbar) {
                    const opIcons = ['fa-floppy-disk', 'fa-file-pdf', 'fa-cog', 'fa-sitemap', 'fa-microchip', 'fa-image', 'fa-file-zipper', 'fa-columns', 'fa-arrows-alt'];
                    toolbar.querySelectorAll('button').forEach(btn => {
                        const icon = btn.querySelector('i');
                        if (icon && opIcons.some(cls => icon.classList.contains(cls))) {
                            btn.classList.add('aegis-op-btn');
                        }
                        const title = btn.getAttribute('title');
                        if (title && !btn.parentNode.classList.contains('tooltip')) {
                            const wrap = document.createElement('span');
                            wrap.className = 'tooltip tooltip-bottom align-middle';
                            wrap.setAttribute('data-tip', title);
                            btn.parentNode.insertBefore(wrap, btn);
                            wrap.appendChild(btn);
                            btn.removeAttribute('title');
                        }
                    });
                }
            }, 100);
        })();
    </script>

</div>
