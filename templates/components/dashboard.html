<div class="space-y-8">
    <div class="flex items-center justify-between py-2 border-b border-white/5 no-border-l">
        <div>
            <h1 class="text-2xl font-bold text-zinc-100 tracking-tight">DASHBOARD // OVERVIEW</h1>
            <p class="text-zinc-500 text-sm mt-1">SPACECRAFT DOCUMENTATION MANAGEMENT SYSTEM</p>
        </div>
        <div class="flex items-center space-x-4">
            <button hx-get="/root-picker" hx-target="#modal-container"
                class="btn-ghost text-[10px] rounded-sm focus:outline-none">
                SET_ARCHIVE
            </button>
            <a href="/files" hx-get="/files" hx-target="#aegis-view-core" hx-push-url="true"
                class="btn-solid text-[10px] rounded-sm focus:outline-none shadow-[0_0_15px_rgba(0,240,255,0.2)] no-underline">
                LIBRARY_ACCESS
            </a>
        </div>
    </div>

    <div id="stats-container">
        {% include 'components/stats_grid.html' %}
    </div>

    <div id="services-status-container"
        hx-get="/services/status"
        hx-trigger="load"
        hx-target="this"
        hx-swap="innerHTML">
        <div class="glass-panel p-6 col-span-1 md:col-span-2 tracking-widest uppercase opacity-40 flex items-center space-x-3">
            <i class="fa fa-microchip fa-spin text-(--neon-cyan)"></i>
            <span class="text-xs text-zinc-400">PROBING_BACKEND_SERVICES...</span>
        </div>
    </div>
</div>
