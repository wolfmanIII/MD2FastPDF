<div class="flex flex-col h-[70vh] industrial-border overflow-hidden">
    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-2 border-b border-zinc-800 bg-zinc-900/40 shrink-0">
        <div class="flex items-center space-x-1 text-[10px] font-mono uppercase tracking-widest text-zinc-500 overflow-x-auto no-scrollbar">
            <span class="text-violet-500 font-bold shrink-0">MODE_PREVIEW //</span>
            {% for crumb in breadcrumbs %}
            <button hx-get="/files?path={{ crumb.path }}" 
                    hx-target="#main-view"
                    class="hover:text-violet-400 transition-colors whitespace-nowrap">
                {{ crumb.name }}
            </button>
            <span class="text-zinc-700">/</span>
            {% endfor %}
            <span class="text-zinc-100 whitespace-nowrap">{{ filename }}</span>
        </div>
        <div class="flex items-center space-x-2">
            <a href="/pdf/download?path={{ path }}" target="_blank"
               class="px-4 py-1 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 text-xs font-mono uppercase transition-all shadow-md border border-zinc-700">
                DOWNLOAD_PDF
            </a>
            <button hx-get="/editor?path={{ path }}" hx-target="#main-view"
                    class="px-4 py-1 bg-violet-600 hover:bg-violet-700 text-white text-xs font-mono uppercase transition-all shadow-md">
                BACK_TO_EDIT
            </button>
        </div>
    </div>

    <!-- PDF Viewer -->
    <div class="flex-grow bg-zinc-950 flex items-center justify-center p-4">
        <object data="/pdf/preview?path={{ path }}#view=FitH" 
                type="application/pdf" 
                class="w-full h-full border border-zinc-800 shadow-2xl">
            <div class="text-center p-8 space-y-4">
                <p class="text-zinc-500 font-mono text-sm uppercase">Il tuo browser non supporta la visualizzazione diretta dei PDF.</p>
                <a href="/pdf/download?path={{ path }}" class="text-violet-400 hover:text-violet-300 underline font-mono text-xs">SCARICA IL DOCUMENTO PDF</a>
            </div>
        </object>
    </div>
</div>
