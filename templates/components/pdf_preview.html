<div class="flex-grow flex flex-col h-[85vh] glass-panel relative overflow-hidden tracking-widest uppercase">
    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-3 neon-border-b shrink-0 relative z-10 bg-black/40">
        <div class="flex items-center space-x-2 text-[10px] uppercase overflow-x-auto no-scrollbar">
            <span class="font-bold shrink-0 text-zinc-100">MODE_PREVIEW //</span>
            {% for crumb in breadcrumbs %}
            <button hx-get="/files?path={{ crumb.path }}" 
                    hx-target="#aegis-view-core" hx-push-url="true"
                    class="text-zinc-100 hover:text-white transition-colors whitespace-nowrap px-2 py-0.5 rounded-sm bg-white/5">
                {{ crumb.name }}
            </button>
            <span class="text-zinc-200">/</span>
            {% endfor %}
            <span class="neon-text font-bold whitespace-nowrap drop-shadow-[0_0_8px_rgba(0,240,255,0.8)]">{{ filename }}</span>
        </div>
        <div class="flex items-center space-x-1">
            {% if not is_pdf_file %}
            <!-- HUD_PRINT toggle: cycles header_footer param on iframe and download link -->
            <button id="hud-toggle"
                    onclick="(function(){
                        var active = this.dataset.active === '1';
                        active = !active;
                        this.dataset.active = active ? '1' : '0';
                        this.classList.toggle('btn-solid', active);
                        this.classList.toggle('btn-ghost', !active);
                        var loader = document.getElementById('aegis-pdf-loader');
                        loader.style.display = 'flex';
                        loader.style.opacity = '1';
                        var hf = active ? '&header_footer=true' : '';
                        document.getElementById('pdf-iframe').src = '/pdf/preview?path={{ path }}' + hf + '#view=FitH';
                        document.getElementById('pdf-download-link').href = '/pdf/download?path={{ path }}' + hf;
                    }).call(this)"
                    data-active="0"
                    class="btn-ghost text-[10px] rounded-sm flex items-center space-x-2">
                {% with class="w-3 h-3" %}{% include 'icons/shield.html' %}{% endwith %}
                <span>HUD_PRINT</span>
            </button>
            {% endif %}
            <a id="pdf-download-link" href="/pdf/download?path={{ path }}" target="_blank"
               class="btn-ghost text-[10px] rounded-sm flex items-center space-x-2 no-underline">
                {% with class="w-3 h-3" %}{% include 'icons/pdf.html' %}{% endwith %}
                <span>DOWNLOAD_PDF</span>
            </a>
            <button hx-get="/files?path={{ path|parent_path }}"
                    hx-target="#aegis-view-core" hx-push-url="true"
                    class="btn-ghost text-[10px] rounded-sm flex items-center space-x-2 mr-2">
                {% with class="w-3 h-3 text-zinc-400" %}{% include 'icons/folder.html' %}{% endwith %}
                <span>TERMINAL_FILES</span>
            </button>
            {% if not is_pdf_file %}
            <button hx-get="/editor?path={{ path }}" hx-target="#aegis-view-core" hx-push-url="true"
                    class="btn-solid text-[10px] rounded-sm flex items-center space-x-2">
                {% with class="w-3 h-3" %}{% include 'icons/action-back.html' %}{% endwith %}
                <span>BACK_TO_EDIT</span>
            </button>
            {% endif %}
        </div>
    </div>

    <!-- PDF Viewer -->
    <div class="flex-grow relative z-10 p-6 flex items-center justify-center bg-zinc-950/20" style="height: 80vh !important;">
        <!-- Aegis Loader Overlay -->
        <div id="aegis-pdf-loader" class="absolute inset-0 flex flex-col items-center justify-center z-20 space-y-6 pointer-events-none transition-opacity duration-500 bg-zinc-950/80">
            <div class="relative w-16 h-16">
                <!-- Outer Ring -->
                <div class="absolute inset-0 border-2 border-[var(--neon-cyan)]/20 rounded-full"></div>
                <!-- Inner Spinning Pulse -->
                <div class="absolute inset-0 border-t-2 border-[var(--neon-cyan)] rounded-full animate-spin shadow-[0_0_15px_rgba(0,240,255,0.4)]"></div>
                <!-- Core Pulse -->
                <div class="absolute inset-2 bg-[var(--neon-cyan)]/10 rounded-full animate-pulse blur-sm"></div>
            </div>
            <div class="flex flex-col items-center space-y-2">
                <span class="text-[10px] neon-text font-bold tracking-[0.4em] uppercase animate-pulse">GENERATING_PDF_STREAM</span>
                <span class="text-[8px] text-zinc-500 italic tracking-widest uppercase">Initializing Gotenberg Chromium Core...</span>
            </div>
        </div>

        <iframe id="pdf-iframe" src="/pdf/preview?path={{ path }}#view=FitH"
                class="w-full h-full neon-border shadow-[0_0_30px_rgba(0,240,255,0.2)] rounded-sm bg-zinc-900 absolute inset-0 z-10"
                style="height: 100% !important; min-height: 100% !important; border: 1px solid rgba(0,240,255,0.2) !important;"
                onload="document.getElementById('aegis-pdf-loader').style.opacity='0'; setTimeout(()=>document.getElementById('aegis-pdf-loader').style.display='none', 500)">
        </iframe>
    </div>
</div>
