<div class="flex-grow flex flex-col h-[85vh] glass-panel relative overflow-hidden tracking-widest uppercase">
    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-3 neon-border-b shrink-0 relative z-10 bg-black/40">
        <div class="flex items-center space-x-2 text-[10px] uppercase overflow-x-auto no-scrollbar">
            <span class="font-bold shrink-0 text-zinc-100">MODE_PREVIEW //</span>
            {% for crumb in breadcrumbs %}
            <button hx-get="/files?path={{ crumb.path }}" 
                    hx-target="#aegis-view-core" hx-push-url="true"
                    class="text-zinc-100 hover:text-white transition-colors whitespace-nowrap px-2 py-0.5 rounded-sm bg-white/5">
                {{ crumb.name }}
            </button>
            <span class="text-zinc-200">/</span>
            {% endfor %}
            <span class="neon-text font-bold whitespace-nowrap drop-shadow-[0_0_8px_rgba(0,240,255,0.8)]">{{ filename }}</span>
        </div>
        <div class="flex items-center space-x-1">
            <a href="/pdf/download?path={{ path }}" target="_blank"
               class="btn-ghost text-[10px] rounded-sm flex items-center space-x-2 no-underline">
                {% with class="w-3 h-3" %}{% include 'icons/pdf.html' %}{% endwith %}
                <span>DOWNLOAD_PDF</span>
            </a>
            <button hx-get="/files?path={{ path|parent_path }}" 
                    hx-target="#aegis-view-core" hx-push-url="true"
                    class="btn-ghost text-[10px] rounded-sm flex items-center space-x-2 mr-2">
                {% with class="w-3 h-3 text-zinc-400" %}{% include 'icons/folder.html' %}{% endwith %}
                <span>TERMINAL_FILES</span>
            </button>
            {% if not is_pdf_file %}
            <button hx-get="/editor?path={{ path }}" hx-target="#aegis-view-core" hx-push-url="true"
                    class="btn-solid text-[10px] rounded-sm flex items-center space-x-2">
                {% with class="w-3 h-3" %}{% include 'icons/action-back.html' %}{% endwith %}
                <span>BACK_TO_EDIT</span>
            </button>
            {% endif %}
        </div>
    </div>

    <!-- PDF Viewer -->
    <div class="flex-grow relative z-10 p-6" style="height: 80vh !important;">
        <object data="/pdf/preview?path={{ path }}#view=FitH" 
                type="application/pdf" 
                class="w-full h-full neon-border shadow-[0_0_30px_rgba(0,240,255,0.2)] rounded-sm bg-zinc-950"
                style="height: 100% !important; min-height: 100% !important;">
            <div class="text-center p-8 space-y-4">
                <p class="neon-dim text-sm uppercase">Your browser does not support direct PDF viewing.</p>
                <a href="/pdf/download?path={{ path }}" class="aegis-link text-xs">DOWNLOAD PDF DOCUMENT</a>
            </div>
        </object>
    </div>
</div>
