<div class="flex flex-col h-[70vh] glass-panel relative overflow-hidden tracking-widest uppercase">
    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-3 neon-border-b shrink-0 relative z-10 bg-black/40">
        <div class="flex items-center space-x-2 text-[10px] uppercase overflow-x-auto no-scrollbar">
            <span class="font-bold shrink-0 neon-dim">MODE_PREVIEW //</span>
            {% for crumb in breadcrumbs %}
            <button hx-get="/files?path={{ crumb.path }}" 
                    hx-target="#main-view"
                    class="neon-hover transition-colors whitespace-nowrap px-2 py-0.5 rounded-sm">
                {{ crumb.name }}
            </button>
            <span class="neon-dim">/</span>
            {% endfor %}
            <span class="neon-text font-bold whitespace-nowrap drop-shadow-[0_0_8px_rgba(0,240,255,0.8)]">{{ filename }}</span>
        </div>
        <div class="flex items-center space-x-3">
            <a href="/pdf/download?path={{ path }}" target="_blank"
               class="px-5 py-1.5 text-[10px] uppercase transition-all neon-border neon-dim hover:neon-bg cursor-pointer rounded-sm bg-transparent flex items-center space-x-2">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                <span>DOWNLOAD_PDF</span>
            </a>
            <button hx-get="/editor?path={{ path }}" hx-target="#main-view"
                    class="px-5 py-1.5 text-[10px] uppercase transition-all neon-bg neon-border cursor-pointer rounded-sm flex items-center space-x-2">
                <svg class="w-3 h-3 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 15l-3-3m0 0l3-3m-3 3h8M3 12a9 9 0 1118 0 9 9 0 01-18 0z"></path></svg>
                <span class="text-black font-bold">BACK_TO_EDIT</span>
            </button>
        </div>
    </div>

    <!-- PDF Viewer -->
    <div class="flex-grow bg-transparent flex items-center justify-center p-4 relative z-10">
        <object data="/pdf/preview?path={{ path }}#view=FitH" 
                type="application/pdf" 
                class="w-full h-full neon-border shadow-[0_0_20px_rgba(0,240,255,0.15)] rounded-sm bg-zinc-900/80">
            <div class="text-center p-8 space-y-4">
                <p class="neon-dim text-sm uppercase">Il tuo browser non supporta la visualizzazione diretta dei PDF.</p>
                <a href="/pdf/download?path={{ path }}" class="neon-text neon-hover underline text-xs border-transparent hover:border-b-current">SCARICA IL DOCUMENTO PDF</a>
            </div>
        </object>
    </div>
</div>
