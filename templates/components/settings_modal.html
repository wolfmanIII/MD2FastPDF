<div id="settings-modal" class="modal modal-open">
  <div class="modal-box bg-zinc-900 border border-zinc-700 rounded-none p-0 max-h-[90vh] flex flex-col" style="width:70vw;max-width:70vw;">

    <div class="flex items-center justify-between px-6 py-4 border-b border-zinc-800 shrink-0">
      <span class="neon-text font-mono text-sm uppercase tracking-widest flex items-center gap-2">
        <i class="fa fa-sliders-h"></i>
        // CORE_ECOSYSTEM // SETTINGS_TERMINAL
      </span>
      <button type="button" onclick="closeAegisModal('settings-modal')"
              class="btn btn-ghost btn-sm text-zinc-500">✕</button>
    </div>

    <div class="overflow-y-auto flex-1 p-6 space-y-6">

      <form hx-post="/settings/save" hx-target="#save-notification" class="space-y-4">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-x-6 gap-y-4 items-start">

          <!-- OPERATIONAL STATE -->
          <div class="space-y-2">
            <h4 class="text-[8px] font-bold text-zinc-500 uppercase tracking-[0.4em]">SYSTEM_STATUS:</h4>
            <div class="space-y-3 bg-black/40 p-4 border border-white/5">
              <label class="flex items-center justify-between cursor-pointer group">
                <span class="text-zinc-300 uppercase text-xs tracking-widest group-hover:neon-text transition-colors">Neural Link Protocol</span>
                <input type="checkbox" name="neural_link_enabled" id="neural-link-toggle"
                       {% if settings.neural_link_enabled %}checked{% endif %} value="true"
                       onchange="updateNeuralUI(this.checked)"
                       class="w-10 h-5 bg-zinc-800 border border-zinc-700 checked:bg-(--neon-cyan) appearance-none cursor-pointer rounded-full transition-all">
              </label>
              <div class="h-px bg-white/5 w-full"></div>
              <label class="flex items-center justify-between cursor-pointer group">
                <span class="text-zinc-300 uppercase text-xs tracking-widest group-hover:neon-text transition-colors">PDF Branded Output</span>
                <input type="checkbox" name="pdf_branding_enabled"
                       {% if settings.pdf_branding_enabled %}checked{% endif %} value="true"
                       class="w-10 h-5 bg-zinc-800 border border-zinc-700 checked:bg-(--neon-cyan) appearance-none cursor-pointer rounded-full transition-all">
              </label>
            </div>
          </div>

          <!-- ENDPOINTS — admin only -->
          {% if is_admin %}
          <div class="space-y-2 text-left border-l border-white/10 pl-3">
            <h4 class="text-[8px] font-bold text-zinc-500 uppercase tracking-[0.4em]">UPLINK_COORDINATES:</h4>
            <div class="space-y-3 bg-black/40 p-4 border border-white/5 neural-dependent transition-all duration-300">
              <div class="space-y-1">
                <label class="text-[10px] text-zinc-400 uppercase tracking-widest font-bold block">Ollama Gateway</label>
                <input type="text" name="ollama_ip" value="{{ settings.ollama_ip }}" class="w-full">
              </div>
              <div class="space-y-1">
                <label class="text-[10px] text-zinc-400 uppercase tracking-widest font-bold block">Gotenberg Server</label>
                <input type="text" name="gotenberg_ip" value="{{ settings.gotenberg_ip }}" class="w-full">
              </div>
            </div>
          </div>
          {% endif %}

          <!-- MODELS — admin only -->
          {% if is_admin %}
          <div class="space-y-2 text-left lg:col-span-2 neural-dependent transition-all duration-300">
            <h4 class="text-[8px] font-bold text-zinc-500 uppercase tracking-[0.4em]">NEURAL_DEVICES_SELECTION:</h4>
            <div id="models-grid" class="grid grid-cols-1 lg:grid-cols-3 gap-3 bg-black/40 p-4 border border-white/5">
              <div hx-get="/settings/models"
                   hx-trigger="load"
                   hx-target="#models-grid"
                   hx-swap="innerHTML"
                   class="lg:col-span-3 text-[10px] font-mono text-zinc-500 animate-pulse tracking-widest">
                SCANNING_NEURAL_DEVICES //
              </div>
            </div>
          </div>
          {% endif %}

        </div>

        <div class="flex justify-between items-center pt-4 border-t border-white/5">
          <div id="save-notification" class="text-[11px] font-mono neon-text animate-pulse"></div>
          <div class="flex gap-2">
            <button type="button" onclick="closeAegisModal('settings-modal')"
                    class="btn btn-ghost btn-sm text-zinc-500">ABORT //</button>
            <button type="submit" class="btn-solid text-[10px] rounded-sm min-w-[160px]">UPDATE_ECOSYSTEM //</button>
          </div>
        </div>
      </form>

      <!-- ACCESS KEY — separate form -->
      <div class="border-t border-white/5 pt-4">
        <h4 class="text-[8px] font-bold text-zinc-500 uppercase tracking-[0.4em] mb-3">OPERATOR_ACCESS_KEY:</h4>
        <form hx-post="/auth/password" hx-target="#pw-notification" hx-swap="outerHTML"
              class="bg-black/40 p-4 border border-white/5">
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div class="space-y-1">
              <label class="text-[10px] text-zinc-400 uppercase tracking-widest font-bold block">Current Key</label>
              <input type="password" name="current_password" autocomplete="current-password" class="w-full">
            </div>
            <div class="space-y-1">
              <label class="text-[10px] text-zinc-400 uppercase tracking-widest font-bold block">New Key</label>
              <input type="password" name="new_password" autocomplete="new-password" class="w-full">
            </div>
          </div>
          <div class="flex items-center justify-between mt-3">
            <div id="pw-notification" class="text-[11px] font-mono"></div>
            <button type="submit" class="btn-ghost text-[10px]">ROTATE_KEY //</button>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>

<script>
function updateNeuralUI(enabled) {
    const dependents = document.querySelectorAll('.neural-dependent');
    dependents.forEach(el => {
        if (enabled) {
            el.classList.remove('opacity-30', 'pointer-events-none', 'grayscale');
        } else {
            el.classList.add('opacity-30', 'pointer-events-none', 'grayscale');
        }
    });
}
document.addEventListener('DOMContentLoaded', () => {
    const toggle = document.getElementById('neural-link-toggle');
    if (toggle) updateNeuralUI(toggle.checked);
});
setTimeout(() => {
    const toggle = document.getElementById('neural-link-toggle');
    if (toggle) updateNeuralUI(toggle.checked);
}, 50);
</script>
