<div id="create-modal" class="modal modal-open">
  <div class="bg-zinc-900 border border-zinc-700 max-w-sm w-full rounded-none p-0">

    <div class="flex items-center justify-between px-6 py-4 border-b border-zinc-800">
      <span class="neon-text font-mono text-sm uppercase tracking-widest">// NEW_ENTRY // INITIALIZE</span>
      <button onclick="closeAegisModal('create-modal')" class="btn btn-ghost btn-sm text-zinc-500">✕</button>
    </div>

    <form hx-post="/create" hx-target="#aegis-view-core"
          hx-on::after-request="closeAegisModal('create-modal')"
          class="p-6 space-y-4">
      <input type="hidden" name="path" value="{{ path }}">
      <div class="flex flex-col gap-1">
        <label class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest">FILENAME (MD_ONLY)</label>
        <input type="text" name="filename" placeholder="REQUIRED_NAME" required autofocus class="w-full">
      </div>
      <div class="flex justify-end gap-2 pt-2 border-t border-zinc-800 mt-4">
        <button type="button" onclick="closeAegisModal('create-modal')"
                class="btn btn-ghost btn-sm text-zinc-500">ABORT //</button>
        <button type="submit" class="btn-solid text-[10px] rounded-sm">INITIALIZE //</button>
      </div>
    </form>

  </div>
  <div class="modal-backdrop" onclick="closeAegisModal('create-modal')"></div>
</div>
