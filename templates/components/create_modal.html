<div id="create-modal" class="modal modal-open">
    <div class="modal-box glass-panel border-[var(--neon-cyan)]/30 max-w-sm">
        <h3 class="font-bold text-lg neon-text tracking-widest mb-4">NEW_ENTRY // INITIALIZE</h3>
        
        <form hx-post="/create" hx-target="#aegis-view-core" hx-on::after-request="document.getElementById('create-modal').remove()">
            <input type="hidden" name="path" value="{{ path }}">
            
            <div class="form-control w-full space-y-4">
                <label class="label">
                    <span class="label-text neon-dim text-xs uppercase tracking-tighter">Enter FileName (MD_ONLY)</span>
                </label>
                <input type="text" name="filename" placeholder="REQUIRED_NAME" required autofocus
                       class="input input-bordered w-full bg-black/40 border-[var(--glass-border)] focus:border-[var(--neon-cyan)] text-[var(--neon-cyan)] tracking-widest uppercase text-sm">
                
                <div class="modal-action">
                    <button type="button" class="btn btn-ghost btn-sm text-zinc-500 uppercase tracking-widest" onclick="document.getElementById('create-modal').remove()">Cancel</button>
                    <button type="submit" class="btn btn-primary btn-sm btn-solid uppercase tracking-widest border-none">Initialize</button>
                </div>
            </div>
        </form>
    </div>
</div>
