<div id="blueprint-modal" class="modal modal-open">
  <div class="modal-box bg-zinc-900 border border-zinc-700 max-w-2xl w-full rounded-none p-0">

    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-zinc-800">
      <span class="neon-text font-mono text-sm uppercase tracking-widest">// BLUEPRINT_ARCHIVE</span>
      <button onclick="closeAegisModal('blueprint-modal')"
              class="btn btn-ghost btn-sm text-zinc-500">✕</button>
    </div>

    <!-- Content -->
    <div class="p-6 space-y-6 max-h-[60vh] overflow-y-auto">
      {% if not categories %}
      <p class="text-zinc-500 font-mono text-xs uppercase tracking-widest text-center py-8">
        NO_BLUEPRINTS_FOUND // ADMIN CAN LOAD TEMPLATES
      </p>
      {% else %}
      {% for category, items in categories.items() %}
      <div>
        <p class="text-zinc-500 font-mono text-[10px] uppercase tracking-widest mb-3 border-b border-zinc-800 pb-1">
          {{ category }}
        </p>
        <div class="grid grid-cols-2 gap-2">
          {% for bp in items %}
          <button
            onclick="requestBlueprint('{{ bp.path }}')"
            class="btn-ghost text-left text-[11px] font-mono uppercase tracking-widest px-4 py-3 rounded-none border border-zinc-800 hover:border-(--neon-cyan) hover:neon-text transition-all">
            {{ bp.name }}
          </button>
          {% endfor %}
        </div>
      </div>
      {% endfor %}
      {% endif %}
    </div>

    <!-- Footer -->
    <div class="px-6 py-3 border-t border-zinc-800 flex justify-end">
      <button onclick="closeAegisModal('blueprint-modal')"
              class="btn btn-ghost btn-sm text-zinc-500">ABORT //</button>
    </div>
  </div>
</div>

{% include "components/blueprint_variable_modal.html" %}

<script>
async function requestBlueprint(path) {
  try {
    const res = await fetch('/blueprints/placeholders?path=' + encodeURIComponent(path));
    if (!res.ok) return;
    const data = await res.json();
    const hasPh = data.sections && data.sections.some(s => s.placeholders.length > 0);
    if (!hasPh) {
      await insertBlueprint(path);
    } else {
      openVariableModal(path, data.sections);
    }
  } catch (e) {
    console.error('BLUEPRINT_PLACEHOLDER_CHECK_FAILED', e);
  }
}

function openVariableModal(path, sections) {
  document.getElementById('bp-var-path').value = path;
  const fields = document.getElementById('bp-var-fields');
  fields.innerHTML = '';
  for (const section of sections) {
    if (!section.placeholders.length) continue;
    fields.innerHTML += `
      <p class="text-zinc-400 font-mono text-[10px] uppercase tracking-widest border-b border-zinc-700 pb-1 mt-2">
        <i class="fa fa-angle-right neon-text mr-1"></i>${section.heading}
      </p>
    `;
    for (const ph of section.placeholders) {
      const id = 'bpvar-' + ph.replace(/[^A-Z0-9]/g, '_');
      fields.innerHTML += `
        <div class="flex flex-col gap-1">
          <label for="${id}" class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest">${ph}</label>
          <input type="text" id="${id}" data-placeholder="${ph}" class="w-full" placeholder="${ph}" autocomplete="off">
        </div>
      `;
    }
  }
  closeAegisModal('blueprint-modal');
  document.getElementById('blueprint-var-modal').classList.add('modal-open');
  const first = fields.querySelector('input');
  if (first) setTimeout(() => first.focus(), 50);
}

async function submitVariableForm() {
  const path = document.getElementById('bp-var-path').value;
  try {
    const res = await fetch('/blueprints/content?path=' + encodeURIComponent(path));
    if (!res.ok) return;
    const data = await res.json();
    let content = data.content;
    document.querySelectorAll('#bp-var-fields input').forEach(input => {
      const ph = input.dataset.placeholder;
      const val = input.value.trim() || ('[' + ph + ']');
      content = content.replaceAll('[' + ph + ']', val);
    });
    if (window.aegisEditor) {
      const current = window.aegisEditor.value();
      const separator = current.length > 0 ? '\n\n---\n\n' : '';
      window.aegisEditor.value(current + separator + content);
    } else {
      const textarea = document.getElementById('gs-editor-input')
                    || document.getElementById('pure-editor-input');
      if (!textarea) return;
      const separator = textarea.value.length > 0 ? '\n\n---\n\n' : '';
      textarea.value += separator + content;
      textarea.dispatchEvent(new Event('input'));
    }
    closeAegisModal('blueprint-var-modal');
  } catch (e) {
    console.error('BLUEPRINT_VAR_SUBMIT_FAILED', e);
  }
}

async function insertBlueprint(path) {
  try {
    const res = await fetch('/blueprints/content?path=' + encodeURIComponent(path));
    if (!res.ok) return;
    const data = await res.json();
    if (window.aegisEditor) {
      const current = window.aegisEditor.value();
      const separator = current.length > 0 ? '\n\n---\n\n' : '';
      window.aegisEditor.value(current + separator + data.content);
    } else {
      const textarea = document.getElementById('gs-editor-input')
                    || document.getElementById('pure-editor-input');
      if (!textarea) return;
      const separator = textarea.value.length > 0 ? '\n\n---\n\n' : '';
      textarea.value += separator + data.content;
      textarea.dispatchEvent(new Event('input'));
    }
    closeAegisModal('blueprint-modal');
  } catch (e) {
    console.error('BLUEPRINT_INSERT_FAILED', e);
  }
}
</script>
