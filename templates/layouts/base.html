<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title }}{% endblock %}</title>
    
    <!-- Favicon / Aegis Icon -->
    <link rel="icon" type="image/png" href="/static/favicon/favicon.png">
    <link rel="apple-touch-icon" href="/static/favicon/apple-touch-icon.png">
    <!-- HTMX 1.9.12 (Stable) -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <!-- Tailwind v4 (Compiled) -->
    <link rel="stylesheet" href="/static/css/output.css">
    <!-- daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <!-- Google Fonts: Inter & Roboto Mono for Industrial feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-cyan-dim: #0088aa;
            --neon-glow: 0 0 10px rgba(0, 240, 255, 0.5);
            --glass-bg: rgba(9, 9, 11, 0.75); 
            --glass-border: rgba(0, 240, 255, 0.2);
        }

        body {
            background-color: #050505 !important;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center center;
            color: #e4e4e7 !important;
            font-family: 'Rajdhani', sans-serif !important;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 4px; /* Slight rounding for modern feel */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .glass-panel-hover:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            background: rgba(9, 9, 11, 0.85);
        }
        
        .neon-text { color: var(--neon-cyan) !important; text-shadow: var(--neon-glow); }
        .neon-border { border-color: var(--neon-cyan) !important; box-shadow: 0 0 8px rgba(0,240,255,0.3); }
        .neon-border-b { border-bottom: 1px solid var(--glass-border) !important; }
        .neon-border-t { border-top: 1px solid var(--glass-border) !important; }
        
        .neon-bg { background-color: var(--neon-cyan) !important; color: #000 !important; font-weight: bold; box-shadow: var(--neon-glow); }
        
        .neon-hover { cursor: pointer; transition: all 0.2s ease-in-out; border: 1px solid transparent; }
        .neon-hover:hover { 
            background-color: rgba(0, 240, 255, 0.1) !important; 
            color: var(--neon-cyan) !important; 
            border-color: var(--neon-cyan) !important;
            box-shadow: inset 0 0 10px rgba(0,240,255,0.2);
        }
        
        .neon-dim { color: var(--neon-cyan-dim) !important; }
        
        /* Action Buttons & Interactive elements */
        .btn-ghost {
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            background: rgba(0, 240, 255, 0.05);
            box-shadow: inset 0 0 8px rgba(0,240,255,0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 600;
            padding: 0.4rem 1.25rem;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-ghost:hover {
            background-color: var(--neon-cyan);
            color: #000 !important;
            box-shadow: 0 0 20px rgba(0,240,255,0.5), inset 0 0 10px rgba(255,255,255,0.5);
            transform: translateY(-1px);
        }

        .btn-solid {
            background: linear-gradient(135deg, var(--neon-cyan) 0%, #00d0ee 100%);
            color: #000 !important;
            font-weight: bold;
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 4px 12px rgba(0,240,255,0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding: 0.4rem 1.25rem;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* Prevent buttons from sticking together */
        .btn-ghost + .btn-ghost, 
        .btn-ghost + .btn-solid, 
        .btn-solid + .btn-ghost, 
        .btn-solid + .btn-solid,
        button + button,
        a.btn-ghost + a.btn-ghost,
        a.btn-solid + a.btn-solid {
            margin-left: 0.75rem;
        }
        .btn-solid:hover {
            background: #fff;
            border-color: #fff;
            color: #000 !important;
            box-shadow: 0 0 25px rgba(255,255,255,0.8);
            transform: translateY(-1px);
        }

        .aegis-link {
            color: var(--neon-cyan-dim);
            transition: all 0.2s ease;
            position: relative;
            text-decoration: none;
        }
        .aegis-link:hover {
            color: var(--neon-cyan);
            text-shadow: var(--neon-glow);
        }
        .aegis-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background-color: var(--neon-cyan);
            transition: width 0.3s ease;
            box-shadow: var(--neon-glow);
        }
        .aegis-link:hover::after {
            width: 100%;
        }

        .neon-hover-item {
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .neon-hover-item:hover {
            background: rgba(0, 240, 255, 0.08);
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.1);
        }
    </style>
    <!-- Highlight.js (Industrial Theme) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- EasyMDE Assets (Pre-loaded for reliability) -->
    <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
    <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
</head>
<body class="antialiased min-h-screen flex flex-col" hx-target="#aegis-view-core">
    <!-- Top Futuristic Bar -->
    <div class="h-1 neon-bg w-full"></div>

    <header class="glass-panel border-x-0 border-t-0 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <a href="/" hx-get="/" hx-push-url="true" class="flex items-center space-x-3 group no-underline cursor-pointer">
                    <img src="/static/favicon/favicon.png" alt="Aegis Logo" style="width: 32px; height: 32px; object-fit: contain;" class="drop-shadow-[0_0_8px_rgba(0,240,255,0.4)] group-hover:drop-shadow-[0_0_12px_rgba(0,240,255,0.6)] transition-all">
                    <span class="neon-text font-bold text-2xl tracking-widest">MD2FastPDF</span>
                </a>
                <span class="neon-dim text-[10px] uppercase tracking-[0.3em] hidden sm:block">Aegis Class System</span>
            </div>
            <nav class="flex items-center space-x-6 text-sm font-medium uppercase tracking-widest">
                <a href="/" hx-get="/" hx-push-url="true" class="text-zinc-400 hover:neon-text transition-colors cursor-pointer no-underline">OS_CORE</a>
                <span class="text-zinc-700">|</span>
                <span class="neon-text flex items-center space-x-2"><span class="w-2 h-2 rounded-full neon-bg animate-pulse"></span><span>SYS_ACTIVE</span></span>
            </nav>
        </div>
    </header>

    <div id="aegis-view-core" class="max-w-7xl mx-auto px-4 py-8 flex-grow w-full min-w-0">
        {% block content %}{% endblock %}
    </div>

    <footer class="neon-border-t py-6 bg-black/40 backdrop-blur-md tracking-widest uppercase">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <p class="neon-dim text-[10px]">
                &copy; 2026 TERRAN MANDATE // AUTHENTICATED
            </p>
            <p class="neon-dim text-[10px]">VER 2.0</p>
        </div>
    </footer>

    <div id="modal-container"></div>
    
    <!-- Global HTMX Indicator (Top bar) -->
    <div id="htmx-indicator" class="htmx-indicator fixed top-0 left-0 w-full h-0.5 bg-[var(--neon-cyan)] z-[9999] opacity-0 pointer-events-none transition-opacity duration-300 shadow-[0_0_10px_rgba(0,240,255,1)]"></div>

    <script>
        document.body.addEventListener('htmx:beforeRequest', function(evt) {
            const path = evt.detail.path || evt.detail.requestConfig.path;
            const targetId = 'aegis-view-core';
            const targets = document.querySelectorAll('#' + targetId);
            
            console.log('SYSTEM_LOG // PATH:', path);
            console.log('SYSTEM_LOG // TARGET_COUNT:', targets.length);
            console.log('SYSTEM_LOG // TARGET_HTMX_INTENDED:', evt.detail.elt.getAttribute('hx-target'));
            
            if (targets.length === 0) {
                console.error('SYSTEM_ERR // TARGET_LOST // FALLBACK_TRIGGERED');
                window.location.href = path;
            } else if (targets.length > 1) {
                console.warn('SYSTEM_WARN // DUPLICATE_TARGETS_DETECTED');
            }
        });
        document.body.addEventListener('htmx:responseError', function(evt) {
            console.error('SYSTEM_ERR // CONNECTION_FAILED:', evt.detail.xhr.status);
        });
        document.body.addEventListener('htmx:targetError', function(evt) {
             console.error('SYSTEM_ERR // HTMX_TARGET_ERROR:', evt.detail.target);
             // If HTMX fails to resolve the target, take over
             const path = evt.detail.elt.getAttribute('hx-get');
             if (path) window.location.href = path;
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
