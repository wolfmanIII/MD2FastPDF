<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title }}{% endblock %}</title>
    
    <!-- Favicon / Aegis Icon -->
    <link rel="icon" type="image/png" href="/static/favicon/favicon.png">
    <link rel="apple-touch-icon" href="/static/favicon/apple-touch-icon.png">
    <!-- HTMX 1.9.12 (Stable) -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <!-- Tailwind v4 (Compiled) -->
    <link rel="stylesheet" href="/static/css/output.css">
    <!-- daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <!-- Google Fonts: Inter & Roboto Mono for Industrial feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-cyan-dim: #0088aa;
            --neon-glow: 0 0 10px rgba(0, 240, 255, 0.5);
            --glass-bg: rgba(9, 9, 11, 0.75); 
            --glass-border: rgba(0, 240, 255, 0.2);
        }


        *, *::before, *::after {
            box-sizing: border-box !important;
        }

        body {
            background-color: #09090b !important;
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(0, 240, 255, 0.08) 0%, transparent 70%),
                linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            background-attachment: fixed;
            color: #d4d4d8 !important;
            font-family: 'Rajdhani', sans-serif !important;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(15, 15, 20, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .glass-panel-hover:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
            background: rgba(15, 15, 25, 0.85);
        }
        
        .neon-text { color: var(--neon-cyan) !important; text-shadow: var(--neon-glow); }
        .neon-border { border-color: var(--neon-cyan) !important; box-shadow: 0 0 8px rgba(0,240,255,0.3); }
        .neon-border-b { border-bottom: 1px solid rgba(255,255,255,0.1) !important; }
        .neon-border-t { border-top: 1px solid rgba(255,255,255,0.1) !important; }
        
        .neon-bg { background-color: var(--neon-cyan) !important; color: #000 !important; font-weight: bold; box-shadow: var(--neon-glow); }
        
        .neon-hover { cursor: pointer; transition: all 0.2s ease-in-out; border: 1px solid transparent; }
        .neon-hover:hover { 
            background-color: rgba(0, 240, 255, 0.1) !important; 
            color: var(--neon-cyan) !important; 
            border-color: var(--neon-cyan) !important;
            box-shadow: inset 0 0 10px rgba(0,240,255,0.2);
        }
        
        .neon-dim { color: var(--neon-cyan-dim) !important; }
        
        /* Action Buttons - Polished Industrial */
        .btn-ghost {
            color: var(--neon-cyan);
            border: 1px solid rgba(0, 240, 255, 0.3);
            background: rgba(0, 240, 255, 0.03);
            backdrop-filter: blur(4px);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 600;
            padding: 0.6rem 1.75rem;
            font-size: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
        }
        .btn-ghost:hover {
            background-color: rgba(0, 240, 255, 0.1);
            border-color: var(--neon-cyan);
            color: #fff !important;
            box-shadow: 0 0 20px rgba(0,240,255,0.2);
            transform: translateY(-1px);
        }

        .btn-solid {
            background: var(--neon-cyan);
            color: #000 !important;
            font-weight: 700;
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0,240,255,0.2);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            padding: 0.6rem 1.75rem;
            font-size: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
        }

        .btn-solid:hover {
            background: #fff;
            border-color: #fff;
            color: #000 !important;
            box-shadow: 0 0 30px rgba(255,255,255,0.4);
            transform: translateY(-1px);
        }

        .aegis-link {
            color: var(--neon-cyan-dim);
            transition: all 0.2s ease;
            position: relative;
            text-decoration: none;
        }
        .aegis-link:hover {
            color: var(--neon-cyan);
            text-shadow: var(--neon-glow);
        }

        .neon-hover-item {
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .neon-hover-item:hover {
            background: rgba(0, 240, 255, 0.08);
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.1);
        }
        /* Modal & HTMX Transitions */
        .modal {
            transition: opacity 0.3s ease-in-out;
            backdrop-filter: blur(0px);
        }
        .modal.modal-open {
            opacity: 1;
            backdrop-filter: blur(4px);
        }
        .modal-box {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: scale(0.9) translateY(20px);
            opacity: 0;
        }
        .modal.modal-open .modal-box {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        /* HTMX Swapping / Settling Animation */
        .htmx-added .modal-box {
            animation: aegis-scan-in 0.4s ease-out forwards;
        }

        @keyframes aegis-scan-in {
            from { opacity: 0; transform: translateY(-10px) scale(0.98); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* Smooth Exit */
        .modal-exit {
            opacity: 0 !important;
            backdrop-filter: blur(0px) !important;
            transition: all 0.25s ease-in;
        }
        .modal-exit .modal-box {
            transform: scale(0.95) translateY(10px) !important;
            opacity: 0 !important;
        }
    </style>
    <!-- Highlight.js (Industrial Theme) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- Mermaid.js for Diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
        <!-- EasyMDE and Icons -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
        <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
        <!-- Marked.js for Pure Mode -->
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        mermaid.initialize({ 
            startOnLoad: false, 
            theme: 'dark',
            securityLevel: 'loose',
            themeVariables: {
                primaryColor: '#00f0ff',
                lineColor: '#00f0ff',
                textColor: '#e4e4e7',
                mainBkg: '#09090b',
                nodeBorder: '#0088aa'
            }
        });
    </script>
</head>
<body class="antialiased min-h-screen bg-[#09090b] flex flex-col w-full overflow-x-hidden" hx-target="#aegis-view-core">
    <!-- Top Futuristic Bar -->
    <div class="h-1 neon-bg w-full shrink-0"></div>

    <header class="w-full glass-panel border-x-0 border-t-0 sticky top-0 z-40 shrink-0">
        <div class="w-full px-8 h-16 flex items-center justify-between mx-auto">
            <div class="flex items-center space-x-4">
                <a href="/" hx-get="/" hx-push-url="true" class="flex items-center space-x-3 group no-underline cursor-pointer">
                    <img src="/static/favicon/favicon.png" alt="Aegis Logo" style="width: 32px; height: 32px; object-fit: contain;" class="drop-shadow-[0_0_8px_rgba(0,240,255,0.4)] group-hover:drop-shadow-[0_0_12px_rgba(0,240,255,0.6)] transition-all">
                    <span class="neon-text font-bold text-2xl tracking-widest">MD2FastPDF</span>
                </a>
                <span class="text-zinc-100 text-[10px] uppercase tracking-[0.3em] hidden sm:block">Aegis Class System</span>
            </div>
            <nav class="flex items-center space-x-6 text-sm font-medium uppercase tracking-widest">
                <a href="/" hx-get="/" hx-push-url="true" class="text-zinc-400 hover:neon-text transition-colors cursor-pointer no-underline">OS_CORE</a>
                <span class="text-zinc-700">|</span>
                <span class="neon-text flex items-center space-x-2"><span class="w-2 h-2 rounded-full neon-bg animate-pulse"></span><span>SYS_ACTIVE</span></span>
            </nav>
        </div>
    </header>

    <main class="w-full flex-grow flex flex-col min-h-0">
        <!-- STATIC PADDING WRAPPER (Never swapped by HTMX) -->
        <div class="w-full px-8 py-8 flex-grow flex flex-col min-h-0">
            <div id="aegis-view-core" class="flex-grow flex flex-col min-h-0 min-w-0 w-full">
                {% block content %}{% endblock %}
            </div>
        </div>
    </main>

    <footer class="w-full neon-border-t py-6 bg-black/40 backdrop-blur-md tracking-widest uppercase shrink-0">
        <div class="w-full px-8 flex justify-between items-center">
            <p class="text-zinc-100 text-[10px]">
                &copy; 2026 TERRAN MANDATE // AUTHENTICATED
            </p>
            <p class="text-zinc-100 text-[10px]">VER 2.0</p>
        </div>
    </footer>

    <div id="modal-container"></div>
    
    <!-- Global HTMX Indicator (Top bar) -->
    <div id="htmx-indicator" class="htmx-indicator fixed top-0 left-0 w-full h-0.5 bg-[var(--neon-cyan)] z-[9999] opacity-0 pointer-events-none transition-opacity duration-300 shadow-[0_0_10px_rgba(0,240,255,1)]"></div>

    <script>
        document.body.addEventListener('htmx:beforeRequest', function(evt) {
            const path = evt.detail.path || evt.detail.requestConfig.path;
            const targetId = 'aegis-view-core';
            const targets = document.querySelectorAll('#' + targetId);
            
            console.log('SYSTEM_LOG // PATH:', path);
            console.log('SYSTEM_LOG // TARGET_COUNT:', targets.length);
            console.log('SYSTEM_LOG // TARGET_HTMX_INTENDED:', evt.detail.elt.getAttribute('hx-target'));
            
            if (targets.length === 0) {
                console.error('SYSTEM_ERR // TARGET_LOST // FALLBACK_TRIGGERED');
                window.location.href = path;
            } else if (targets.length > 1) {
                console.warn('SYSTEM_WARN // DUPLICATE_TARGETS_DETECTED');
            }
        });
        document.body.addEventListener('htmx:responseError', function(evt) {
            console.error('SYSTEM_ERR // CONNECTION_FAILED:', evt.detail.xhr.status);
        });
        document.body.addEventListener('htmx:targetError', function(evt) {
             console.error('SYSTEM_ERR // HTMX_TARGET_ERROR:', evt.detail.target);
             // If HTMX fails to resolve the target, take over
             const path = evt.detail.elt.getAttribute('hx-get');
             if (path) window.location.href = path;
        });

        // AEGIS_MODAL_PROTOCOL: Smooth closing
        function closeAegisModal(targetId) {
            const m = typeof targetId === 'string' ? document.getElementById(targetId) : targetId;
            if (m) {
                m.classList.add('modal-exit');
                setTimeout(() => m.remove(), 250);
            }
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
