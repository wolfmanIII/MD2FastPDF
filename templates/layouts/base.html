<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title }}{% endblock %}</title>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <!-- Tailwind v4 (Compiled) -->
    <link rel="stylesheet" href="/static/css/output.css">
    <!-- Google Fonts: Inter & Roboto Mono for Industrial feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <!-- Highlight.js (Industrial Theme) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- EasyMDE Assets (Pre-loaded for reliability) -->
    <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
    <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-300 font-sans antialiased min-h-screen flex flex-col">
    
    <!-- Top Progress/Status Bar -->
    <div class="h-1 bg-violet-600 w-full shadow-[0_0_10px_rgba(139,92,246,0.5)]"></div>

    <header class="border-b border-zinc-800 bg-zinc-900/50 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <span class="text-violet-500 font-mono font-bold text-xl tracking-tighter">MD2FastPDF //</span>
                <span class="text-zinc-500 font-mono text-xs uppercase tracking-widest">v2.0 Stateless</span>
            </div>
            <nav class="flex items-center space-x-6 text-sm font-medium">
                <a href="#" class="hover:text-violet-400 transition-colors">FILES</a>
                <a href="#" class="hover:text-violet-400 transition-colors">TEMPLATES</a>
                <a href="#" class="hover:text-violet-400 transition-colors">STATUS</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 flex-grow w-full">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-zinc-800 py-6 bg-zinc-900/30">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-zinc-600 text-xs font-mono tracking-widest uppercase">
                &copy; 2026 industrial systems // authenticated terminal
            </p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
